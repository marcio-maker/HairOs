<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HairOS — Salão Inteligente</title>

    <style>
        /* ============================================================
           VARIÁVEIS E TEMA
           ============================================================ */
        :root {
            --bg-body: #f5f0eb;
            --bg-chat: #ffffff;
            --bg-header: #1a1a1a;
            --bg-messages: #faf8f6;
            --bg-bubble-user: #1a1a1a;
            --bg-bubble-bot: #ffffff;
            --bg-input: #faf8f6;
            --bg-btn-primary: #1a1a1a;
            --bg-btn-primary-hover: #333;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #f5f0eb;
            --bg-tag: #f0ebe6;
            --bg-tag-highlight: #d4a57422;
            --bg-divider: transparent;
            --bg-meeting: #d4a57422;
            --bg-menu: #1a1a1a;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --text-white: #fff;
            --text-bubble-user: #fff;
            --text-bubble-bot: #1a1a1a;
            --text-header: #fff;
            --text-header-muted: #888;
            --text-accent: #b8834a;
            --text-menu: #fff;
            --border-input: #e8e0da;
            --border-input-focus: #d4a574;
            --border-bubble: transparent;
            --border-btn-outline: #ddd;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0,0,0,0.06);
            --shadow-chat: 0 20px 60px rgba(0,0,0,0.12);
            --shadow-menu: 0 8px 30px rgba(0,0,0,0.4);
            --shadow-modal: 0 25px 80px rgba(0,0,0,0.5);
            --avatar-helena: linear-gradient(135deg, #e8b4a0, #d49a82);
            --avatar-arthur: linear-gradient(135deg, #7ec8d4, #4a9aa8);
            --avatar-isabella: linear-gradient(135deg, #f0a8c4, #d4789a);
            --avatar-rafael: linear-gradient(135deg, #b8a0c8, #8e76a8);
            --avatar-user: linear-gradient(135deg, #ccc, #999);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #d4a574;
            --product-bg: #f8f4f0;
            --product-border: #e8e0da;
        }

        [data-theme="dark"] {
            --bg-body: #0d0d0d;
            --bg-chat: #1a1a1a;
            --bg-header: #0d0d0d;
            --bg-messages: #141414;
            --bg-bubble-user: #2a2a2a;
            --bg-bubble-bot: #1e1e1e;
            --bg-input: #1a1a1a;
            --bg-btn-primary: #d4a574;
            --bg-btn-primary-hover: #c49464;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #2a2a2a;
            --bg-tag: #2a2a2a;
            --bg-tag-highlight: #d4a57433;
            --bg-divider: transparent;
            --bg-meeting: #d4a57433;
            --bg-menu: #0d0d0d;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --text-muted: #666;
            --text-white: #fff;
            --text-bubble-user: #f0f0f0;
            --text-bubble-bot: #f0f0f0;
            --text-header: #fff;
            --text-header-muted: #666;
            --text-accent: #d4a574;
            --text-menu: #f0f0f0;
            --border-input: #333;
            --border-input-focus: #d4a574;
            --border-bubble: #2a2a2a;
            --border-btn-outline: #444;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0,0,0,0.3);
            --shadow-chat: 0 20px 60px rgba(0,0,0,0.5);
            --shadow-menu: 0 8px 30px rgba(0,0,0,0.7);
            --shadow-modal: 0 25px 80px rgba(0,0,0,0.7);
            --avatar-helena: linear-gradient(135deg, #c4947a, #b8834a);
            --avatar-arthur: linear-gradient(135deg, #5a9aa8, #3a7a88);
            --avatar-isabella: linear-gradient(135deg, #d4789a, #b85a7a);
            --avatar-rafael: linear-gradient(135deg, #8e76a8, #6a5a88);
            --avatar-user: linear-gradient(135deg, #555, #333);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #555;
            --product-bg: #1a1a1a;
            --product-border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 780px;
            background: var(--bg-chat);
            border-radius: 32px;
            box-shadow: var(--shadow-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .chat-header {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            transition: background 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .chat-header .logo {
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }
        .chat-header .logo:hover { opacity: 0.8; }
        .chat-header .logo span { color: #d4a574; }
        .chat-header .status {
            font-size: 11px;
            color: var(--text-header-muted);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
        }
        .chat-header .status .dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .menu-btn {
            background: none; border: none;
            color: var(--text-header-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            line-height: 1;
        }
        .menu-btn:hover { color: var(--text-header); }

        .agent-indicators {
            display: flex;
            gap: 6px;
            margin-left: 6px;
            align-items: center;
        }
        .agent-indicators .indicator {
            width: 28px; height: 28px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        .agent-indicators .indicator:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.3);
        }
        .agent-indicators .indicator.active {
            border-color: #d4a574;
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(212,165,116,0.5);
        }
        .agent-indicators .indicator.speaking {
            animation: speak-pulse 0.8s ease-in-out infinite alternate;
            border-color: #4ade80;
            box-shadow: 0 0 16px rgba(74,222,128,0.6);
        }
        @keyframes speak-pulse {
            0% { transform: scale(1); box-shadow: 0 0 8px rgba(74,222,128,0.3); }
            100% { transform: scale(1.15); box-shadow: 0 0 20px rgba(74,222,128,0.8); }
        }
        .agent-indicators .indicator .wave-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: ring-wave 1.2s ease-out infinite;
            pointer-events: none;
        }
        .agent-indicators .indicator.speaking .wave-ring {
            border-color: rgba(74,222,128,0.4);
        }
        @keyframes ring-wave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .agent-indicators .indicator .agent-label {
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .agent-indicators .indicator:hover .agent-label { opacity: 1; }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-chat);
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-modal);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
            position: relative;
        }
        .modal-overlay.open .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-content .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
            line-height: 1;
        }
        .modal-content .modal-close:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }
        .modal-content .modal-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            display: block;
        }
        .modal-content .modal-body {
            padding: 24px 28px 28px 28px;
        }
        .modal-content .modal-body .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .modal-content .modal-body .modal-subtitle {
            font-size: 13px;
            color: var(--text-accent);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .modal-content .modal-body .modal-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .modal-content .modal-body .modal-btn {
            background: var(--bg-btn-primary);
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            width: 100%;
        }
        .modal-content .modal-body .modal-btn:hover {
            background: var(--bg-btn-primary-hover);
            transform: translateY(-2px);
        }

        /* ============================================================
           PRODUTOS
           ============================================================ */
        .product-card {
            background: var(--product-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 6px 0;
            border: 1px solid var(--product-border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .product-card:hover {
            transform: translateX(4px);
            border-color: var(--text-accent);
        }
        .product-card .product-icon {
            font-size: 28px;
            flex-shrink: 0;
            width: 44px;
            text-align: center;
        }
        .product-card .product-info {
            flex: 1;
        }
        .product-card .product-info .product-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
        }
        .product-card .product-info .product-desc {
            font-size: 11px;
            color: var(--text-muted);
        }
        .product-card .product-info .product-price {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-accent);
        }
        .product-card .product-btn {
            background: var(--bg-btn-accent);
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            flex-shrink: 0;
        }
        .product-card .product-btn:hover {
            background: var(--bg-btn-accent-hover);
            transform: scale(1.05);
        }

        /* ============================================================
           COMPARTILHAMENTO
           ============================================================ */
        .share-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .share-buttons .share-btn {
            flex: 1;
            min-width: 60px;
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .share-buttons .share-btn:hover { transform: translateY(-2px); }
        .share-buttons .share-btn.whatsapp { background: #25D366; color: #fff; }
        .share-buttons .share-btn.instagram { background: #E4405F; color: #fff; }
        .share-buttons .share-btn.twitter { background: #1DA1F2; color: #fff; }
        .share-buttons .share-btn.copy { background: var(--bg-btn-primary); color: #fff; }

        /* ============================================================
           HISTÓRICO
           ============================================================ */
        .history-item {
            padding: 8px 12px;
            border-left: 3px solid var(--text-accent);
            margin: 4px 0;
            background: var(--bg-tag);
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .history-item .history-date {
            font-size: 10px;
            color: var(--text-muted);
        }
        .history-item .history-agente {
            font-weight: 600;
            color: var(--text-accent);
        }

        /* ============================================================
           MENU LATERAL
           ============================================================ */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .menu-overlay.open { opacity: 1; pointer-events: all; }
        .menu-panel {
            position: absolute;
            top: 0; left: 0;
            width: 260px;
            height: 100%;
            background: var(--bg-menu);
            box-shadow: var(--shadow-menu);
            z-index: 100;
            transform: translateX(-110%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 0 20px 20px 0;
            overflow-y: auto;
        }
        .menu-panel.open { transform: translateX(0); }
        .menu-panel .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-menu);
        }
        .menu-panel .menu-header span {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-menu);
        }
        .menu-panel .menu-close {
            background: none; border: none;
            color: var(--text-header-muted);
            font-size: 20px;
            cursor: pointer;
        }
        .menu-panel .menu-close:hover { color: var(--text-header); }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-menu);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            text-align: left;
        }
        .menu-item:hover { background: var(--bg-menu-item-hover); }
        .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .menu-item .label { flex: 1; }
        .menu-item .badge {
            font-size: 11px;
            background: rgba(212,165,116,0.25);
            color: var(--text-accent);
            padding: 2px 10px;
            border-radius: 12px;
        }
        .menu-divider { height: 1px; background: var(--border-menu); margin: 4px 0; }
        .menu-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            margin-bottom: 4px;
        }
        .menu-profile .profile-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--avatar-user);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 2px solid var(--border-menu);
        }
        .menu-profile .profile-name { color: var(--text-menu); font-weight: 600; font-size: 14px; }
        .menu-profile .profile-sub { color: var(--text-header-muted); font-size: 11px; }
        .menu-profile .profile-upload {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border-menu);
            color: var(--text-header-muted);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .menu-profile .profile-upload:hover {
            background: var(--bg-menu-item-hover);
            color: var(--text-menu);
        }

        .menu-panel .menu-history {
            max-height: 150px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .menu-panel .menu-history::-webkit-scrollbar { width: 3px; }
        .menu-panel .menu-history::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }
        .menu-panel .menu-history .history-empty {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            padding: 8px 0;
        }

        /* ============================================================
           MENSAGENS
           ============================================================ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-messages);
            transition: background 0.3s ease;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 92%;
            animation: fade-in 0.3s ease;
        }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-indent: -9999px;
        }
        .avatar.helena { background-image: url('https://images.unsplash.com/photo-1580618672591-eb180b1a973f?w=80&h=80&fit=crop&crop=face'); }
        .avatar.arthur { background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face'); }
        .avatar.isabella { background-image: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?w=80&h=80&fit=crop&crop=face'); }
        .avatar.rafael { background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=80&h=80&fit=crop&crop=face'); }
        .avatar.user {
            background-image: var(--user-avatar, url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&h=80&fit=crop&crop=face'));
            background-size: cover;
            font-size: 14px;
            text-indent: -9999px;
        }
        .avatar.system {
            background: var(--avatar-system);
            font-size: 12px;
            text-indent: 0;
        }

        .bubble {
            background: var(--bg-bubble-bot);
            padding: 10px 14px;
            border-radius: 14px;
            border-top-left-radius: 4px;
            box-shadow: var(--shadow-bubble);
            line-height: 1.5;
            font-size: 13.5px;
            color: var(--text-bubble-bot);
            flex: 1;
            border: 1px solid var(--border-bubble);
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .message.user .bubble {
            background: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-top-left-radius: 14px;
            border-top-right-radius: 4px;
            border-color: transparent;
        }
        .bubble .agent-name {
            font-weight: 700;
            font-size: 12px;
            display: block;
            margin-bottom: 1px;
            color: var(--text-primary);
        }
        .bubble .agent-role {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            margin-bottom: 3px;
        }
        .bubble .agent-desc {
            font-size: 11px;
            color: var(--text-accent);
            font-weight: 500;
            display: inline-block;
            margin-bottom: 4px;
            padding: 3px 10px;
            background: var(--bg-tag-highlight);
            border-radius: 8px;
        }
        .bubble .text { margin-top: 2px; color: var(--text-primary); }
        .bubble .text p { margin-bottom: 5px; }
        .bubble .text p:last-child { margin-bottom: 0; }
        .bubble .agent-context {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 4px;

        // ============================================================
        // 10. FUNÇÕES DE HISTÓRICO
        // ============================================================
        function salvarHistorico(entrada) {
            const entry = { data: new Date().toLocaleString(), ...entrada };
            estado.historico.unshift(entry);
            if (estado.historico.length > 50) estado.historico = estado.historico.slice(0, 50);
            localStorage.setItem('hairos-historico', JSON.stringify(estado.historico));
            atualizarMenuHistorico();
            atualizarBadgeHistorico();
        }

        function atualizarMenuHistorico() {
            const container = document.getElementById('menuHistoryList');
            if (!container) return;
            if (estado.historico.length === 0) {
                container.innerHTML = '<div class="history-empty">Nenhuma interação ainda</div>';
                return;
            }
            let html = '';
            estado.historico.slice(0, 10).forEach(item => {
                const agente = AGENTES[item.agente]?.nome || item.agente || 'Sistema';
                const icon = AGENTES[item.agente]?.emoji || '💬';
                html += `
                    <div class="history-item">
                        <span class="history-agente">${icon} ${agente}</span>
                        <div>${item.texto ? item.texto.substring(0, 60) + (item.texto.length > 60 ? '...' : '') : 'Interação'}</div>
                        <span class="history-date">${item.data || ''}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function atualizarBadgeHistorico() {
            const badge = document.getElementById('historyBadge');
            if (badge) badge.textContent = estado.historico.length;
        }

        // ============================================================
        // 11. RENDERIZAÇÃO
        // ============================================================
        const messagesEl = document.getElementById('messages');
        const indicators = document.querySelectorAll('.indicator');

        function scrollToBottom() {
            setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
        }

        function updateIndicators(agenteId, speaking = false) {
            indicators.forEach(el => {
                const isTarget = el.dataset.agent === agenteId;
                el.classList.toggle('active', isTarget);
                el.classList.toggle('speaking', speaking && isTarget);
            });
        }

        function animateAgentConversation(agentes, duration = 2000) {
            let index = 0;
            const interval = setInterval(() => {
                indicators.forEach(el => el.classList.remove('speaking', 'active'));
                const current = agentes[index % agentes.length];
                const el = document.querySelector(`.indicator[data-agent="${current}"]`);
                if (el) {
                    el.classList.add('speaking', 'active');
                }
                index++;
                if (index >= agentes.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        indicators.forEach(el => {
                            el.classList.remove('speaking', 'active');
                            if (el.dataset.agent === 'helena') el.classList.add('active');
                        });
                    }, 400);
                }
            }, duration / agentes.length);
        }

        function addMessage(agenteId, html, extraClass = '', contexto = null, imagens = null) {
            const agente = AGENTES[agenteId];
            if (!agente) return;
            const div = document.createElement('div');
            div.className = `message bot ${extraClass}`;
            let contextHtml = '';
            if (contexto) {
                contextHtml = `<div class="agent-context">💭 ${contexto}</div>`;
            }
            let imagesHtml = '';
            if (imagens) {
                if (Array.isArray(imagens)) {
                    imagesHtml = `<div class="hair-grid">${imagens.map(img => `<img src="${img}" class="hair-image" alt="Referência" loading="lazy" />`).join('')}</div>`;
                } else {
                    imagesHtml = `<img src="${imagens}" class="hair-image" alt="Referência" loading="lazy" />`;
                }
            }
            const descHtml = agente.descricao ? `<span class="agent-desc">${agente.descricao}</span>` : '';

            div.innerHTML = `
                <div class="avatar ${agente.avatar}"></div>
                <div class="bubble ${extraClass}">
                    <span class="agent-name">${agente.emoji} ${agente.nome}</span>
                    <span class="agent-role">${agente.role}</span>
                    ${descHtml}
                    <div class="text">
                        ${html}
                        ${imagesHtml}
                    </div>
                    ${contextHtml}
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            updateIndicators(agenteId);
            const allAgents = ['helena', 'arthur', 'isabella', 'rafael'];
            animateAgentConversation(allAgents, 1800);
            if (estado.contextos[agenteId]) {
                estado.contextos[agenteId].interacoes += 1;
            }
            salvarHistorico({ agente: agenteId, texto: html.replace(/<[^>]*>/g, '').substring(0, 100) });
        }

        function addMessageWithoutHistory(agenteId, html, extraClass = '', contexto = null, imagens = null) {
            const agente = AGENTES[agenteId];
            if (!agente) return;
            const div = document.createElement('div');
            div.className = `message bot ${extraClass}`;
            let contextHtml = '';
            if (contexto) {
                contextHtml = `<div class="agent-context">💭 ${contexto}</div>`;
            }
            let imagesHtml = '';
            if (imagens) {
                if (Array.isArray(imagens)) {
                    imagesHtml = `<div class="hair-grid">${imagens.map(img => `<img src="${img}" class="hair-image" alt="Referência" loading="lazy" />`).join('')}</div>`;
                } else {
                    imagesHtml = `<img src="${imagens}" class="hair-image" alt="Referência" loading="lazy" />`;
                }
            }
            const descHtml = agente.descricao ? `<span class="agent-desc">${agente.descricao}</span>` : '';

                    <div class="text">

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            const avatarStyle = estado.usuario.avatarUrl ? `background-image: url('${estado.usuario.avatarUrl}');` : '';
            div.innerHTML = `
                <div class="avatar user" style="${avatarStyle}"></div>
                <div class="bubble">${text}</div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            estado.ultima_pergunta = text;
            salvarHistorico({ agente: 'usuario', texto: text });
        }

        function addDivider(texto) {
            const div = document.createElement('div');
            div.className = 'divider';
            div.textContent = texto;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addMeetingBadge(texto, pulsante = false) {
            const div = document.createElement('div');
            div.className = 'meeting-badge';
            div.innerHTML = `🎙️ ${pulsante ? '<span class="pulse-text">' + texto + '</span>' : texto}`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function createButtons(buttons) {
            const container = document.createElement('div');
            container.className = 'quick-buttons';
            buttons.forEach(btn => {
                const el = document.createElement('button');
                el.className = `btn ${btn.class || ''}`;
                el.textContent = btn.label;
                el.dataset.action = btn.action;
                if (btn.disabled) el.disabled = true;
                if (btn.onclick) {
                    el.addEventListener('click', btn.onclick);
                } else if (btn.action) {
                    el.addEventListener('click', () => {
                        if (btn.action) handleAction(btn.action, btn.data);
                    });
                }
                container.appendChild(el);
            });
            return container;
        }

        function appendButtons(buttons) {
            const msgs = messagesEl.querySelectorAll('.message.bot');
            if (msgs.length === 0) return;
            const last = msgs[msgs.length - 1];
            const bubble = last.querySelector('.bubble');
            if (bubble) {
                const existing = bubble.querySelector('.quick-buttons');
                if (existing) existing.remove();
                bubble.appendChild(createButtons(buttons));
            }
        }

        function removeLastButtons() {
            const msgs = messagesEl.querySelectorAll('.message.bot');
            if (msgs.length === 0) return;
            const last = msgs[msgs.length - 1];
            const bubble = last.querySelector('.bubble');
            if (bubble) {
                const existing = bubble.querySelector('.quick-buttons');
                if (existing) existing.remove();
            }
        }

        function removeLastMessage() {
            const msgs = messagesEl.querySelectorAll('.message');
            if (msgs.length > 0) {
                const last = msgs[msgs.length - 1];
                if (last) last.remove();
            }
        }

        function removeMessagesByKeyword(keyword) {
            const msgs = messagesEl.querySelectorAll('.message');
            let removidas = 0;
            for (let i = msgs.length - 1; i >= 0; i--) {
                const msg = msgs[i];
                const text = msg.querySelector('.text')?.textContent || '';
                if (text.includes(keyword)) {
                    msg.remove();
                    removidas++;
                    if (removidas > 15) break;
                }
            }
        }

        // ============================================================
        // 12. REUNIÃO DOS ESPECIALISTAS
        // ============================================================
        function executarReuniao(callback) {
            estado.meeting_ativa = true;
            let delay = 1000;
            addMeetingBadge('🎙️ REUNIÃO DOS ESPECIALISTAS', true);
            removeLastButtons();

            const agentes = [
                { id: 'rafael', texto: '👤 Pela imagem, vejo que o formato do rosto é versátil. Podemos trabalhar com cortes que valorizam a simetria e tragam equilíbrio.' },
                { id: 'arthur', texto: '✂️ Concordo! A estrutura do cabelo parece saudável. Short Bob, Butterfly ou Pixie podem ficar incríveis!' },
                { id: 'isabella', texto: '🎨 Pelo tom de pele, tons quentes como mel e caramelo vão iluminar muito o rosto. Combinado com o corte certo, fica perfeito!' },
                { id: 'helena', texto: '👋 Ótimo! Já temos uma direção. Agora vamos entender o que o cliente deseja com o quiz.' }
            ];

            agentes.forEach((agente, index) => {
                setTimeout(() => {
                    updateIndicators(agente.id, true);
                    const agenteInfo = AGENTES[agente.id];
                    const descHtml = agenteInfo.descricao ? `<span class="agent-desc">${agenteInfo.descricao}</span>` : '';
                    const div = document.createElement('div');

                        <div class="avatar ${agenteInfo.avatar}"></div>

                            <span class="agent-name">${agenteInfo.emoji} ${agenteInfo.nome}</span>
                            <span class="agent-role">${agenteInfo.role}</span>
                            ${descHtml}
                            <div class="text">
                                ${agente.texto}
                            </div>
                        </div>
                    `;
                    messagesEl.appendChild(div);
                    scrollToBottom();
                    setTimeout(() => { updateIndicators(agente.id, false); }, 800);
                }, delay);
                delay += 1200 + Math.random() * 400;
            });

            setTimeout(() => {
                addMeetingBadge('✅ REUNIÃO FINALIZADA — Vamos ao quiz!');
                estado.meeting_ativa = false;
                if (callback) callback();
                setTimeout(() => {
                    indicators.forEach(el => {
                        el.classList.remove('speaking', 'active');
                        if (el.dataset.agent === 'helena') el.classList.add('active');
                    });
                }, 300);
            }, delay + 500);
        }

        // ============================================================
        // 13. QUIZ
        // ============================================================
        function iniciarQuiz(agenteId) {
            const quiz = QUIZ[agenteId];
            if (!quiz) return;

            if (!estado.usuario.foto) {
                addMessage('helena', `
                    <p>Para fazer o quiz e obter uma análise completa, <strong>preciso que você envie uma foto</strong> primeiro. 📸</p>
                    <p>Isso permite que os especialistas analisem sua estrutura!</p>
                    <div class="photo-upload">
                        <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                            📷 Enviar Foto
                        </button>
                    </div>
                `, '', 'Recepcionista');
                appendButtons([
                    { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                    { label: '👋 Voltar', action: `ir_para_${agenteId}`, class: 'outline' }
                ]);
                return;
            }

            if (estado.quiz_ativo === agenteId) {
                mostrarPerguntaQuiz(agenteId);
                return;
            }

            estado.quiz_ativo = agenteId;
            estado.quiz_pergunta_atual = 0;
            estado.quiz_respostas = {};

            if (estado.especialista_ativo !== agenteId) {
                trocarAgente(agenteId);
            }

            setTimeout(() => {
                addMessage(agenteId, `
                    <p>${quiz.titulo}</p>
                    <p>Vamos descobrir o que combina com você! São 5 perguntas. 🥰</p>
                    <p style="font-size:12px;color:var(--text-muted);">Clique nas opções para responder.</p>
                `, '', 'Início do quiz');
                mostrarPerguntaQuiz(agenteId);
            }, 800);
        }

        function mostrarPerguntaQuiz(agenteId) {
            const quiz = QUIZ[agenteId];
            const idx = estado.quiz_pergunta_atual;

            if (idx >= quiz.perguntas.length) {
                finalizarQuiz(agenteId);
                return;
            }

            const pergunta = quiz.perguntas[idx];
            const progresso = `${idx + 1}/${quiz.perguntas.length}`;

            const botoes = pergunta.opcoes.map((op, i) => ({
                label: op.label,
                class: 'outline',
                onclick: function() {
                    responderQuiz(agenteId, idx, op.valor);
                }
            }));

            if (idx > 0) {
                botoes.push({
                    label: '⬅️ Anterior',
                    class: 'outline',
                    onclick: function() {
                        if (estado.quiz_pergunta_atual > 0) {
                            estado.quiz_pergunta_atual--;
                            removeLastMessage();
                            const userMsgs = messagesEl.querySelectorAll('.message.user');
                            if (userMsgs.length > 0) {
                                const lastUser = userMsgs[userMsgs.length - 1];
                                if (lastUser) lastUser.remove();
                            }
                            setTimeout(() => mostrarPerguntaQuiz(agenteId), 300);
                        }
                    }
                });
            }

            addMessage(agenteId, `
                <p><strong>${pergunta.pergunta}</strong></p>
                <p style="font-size:11px;color:var(--text-muted);">Pergunta ${progresso}</p>
            `, '', `Quiz - ${quiz.titulo}`);

            appendButtons(botoes);
        }

        function responderQuiz(agenteId, idx, valor) {
            const quiz = QUIZ[agenteId];
            const pergunta = quiz.perguntas[idx];

            estado.quiz_respostas[pergunta.id] = valor;
            estado.usuario.quiz[agenteId] = estado.quiz_respostas;

            const opcaoSelecionada = pergunta.opcoes.find(op => op.valor === valor);
            addUserMessage(`📌 ${opcaoSelecionada ? opcaoSelecionada.label : 'Respondido'}`);

            estado.quiz_pergunta_atual++;
            removeLastButtons();

            setTimeout(() => {
                mostrarPerguntaQuiz(agenteId);
            }, 500);
        }

        function finalizarQuiz(agenteId) {
            const quiz = QUIZ[agenteId];
            const respostas = estado.quiz_respostas;
            const recomendacoes = quiz.resultado(respostas);
            const imagemRef = quiz.getImagemRecomendacao ? quiz.getImagemRecomendacao(respostas) : null;
            const sugestoes = quiz.getSugestoes ? quiz.getSugestoes(respostas) : [];

            estado.sugestoes_cortes = sugestoes;
            estado.analise_realizada = true;

            let html = `
                <p>✅ <strong>Quiz finalizado!</strong></p>
                <p>Com base nas suas respostas, aqui estão as recomendações:</p>
                <ul style="margin:8px 0 0 16px; padding-left:4px;">
            `;

            recomendacoes.forEach(r => {
                html += `<li style="margin-bottom:4px;">${r}</li>`;
            });

            html += `</ul>`;

            const recomendacaoFinal = gerarRecomendacaoFinal(agenteId, respostas);

            html += `
                <p style="margin-top:10px;padding:10px;background:var(--bg-tag-highlight);border-radius:8px;">
                    📸 <strong>Análise combinada com sua foto + reunião dos especialistas:</strong><br>
                    ${recomendacaoFinal}
                </p>
                <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    ✅ Análise completa! Abaixo 3 sugestões de cortes com imagens.
                </p>
            `;

            addMessage(agenteId, html, '', `Resultado do quiz - ${quiz.titulo}`, imagemRef);

            // Exibir 3 sugestões de cortes com imagens
            if (sugestoes.length > 0) {
                let gridHtml = `<div class="hair-grid-3">`;
                sugestoes.forEach(s => {
                    gridHtml += `
                        <div>
                            <img src="${s.imagem}" class="hair-image" alt="${s.nome}" loading="lazy" />
                            <div class="hair-label">${s.nome}</div>
                            <div style="font-size:10px;color:var(--text-muted);text-align:center;">${s.desc}</div>
                        </div>
                    `;
                });
                gridHtml += `</div>`;
                addMessageWithoutHistory(agenteId, `
                    <p>✂️ <strong>3 Sugestões de cortes para você:</strong></p>
                    ${gridHtml}
                    <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">💡 Qual desses estilos te agrada mais?</p>
                `, '', 'Sugestões de cortes');
            }

            const botoes = [
                { label: '🔄 Recomeçar quiz', onclick: function() {
                    estado.quiz_ativo = null;
                    estado.quiz_pergunta_atual = 0;
                    estado.quiz_respostas = {};
                    removeMessagesByKeyword('Quiz');
                    removeMessagesByKeyword('Pergunta');
                    removeMessagesByKeyword('Resultado');
                    setTimeout(() => iniciarQuiz(agenteId), 500);
                }, class: 'outline' },
                { label: '🛒 Ver produtos recomendados', onclick: function() {
                    mostrarProdutos(agenteId);
                }, class: 'accent' },
                { label: '👥 Compartilhar resultado', onclick: function() {
                    compartilharResultado(agenteId, recomendacoes);
                }, class: 'outline' },
                { label: '🔙 Voltar ao menu', onclick: function() {
                    estado.quiz_ativo = null;
                    estado.quiz_pergunta_atual = 0;
                    estado.quiz_respostas = {};
                    mostrarOpcoesAgente(agenteId);
                }, class: 'outline' },
            ];

            appendButtons(botoes);
            estado.quiz_ativo = null;
            salvarHistorico({ agente: agenteId, texto: 'Quiz finalizado com sugestões de cortes' });
        }

        function gerarRecomendacaoFinal(agenteId, respostas) {
            const sugestoes = {
                arthur: { default: 'Recomendo um Short Bob com camadas leves para valorizar seu rosto.', oval: 'Recomendo Butterfly com camadas suaves para movimento.', quadrado: 'Recomendo cortes com franja lateral para suavizar.', redondo: 'Recomendo Pixie assimétrico com volume no topo.' },
                isabella: { default: 'Recomendo mel com reflexos para iluminar seu rosto.', quente: 'Recomendo cobre acobreado para realçar seu tom de pele.', frio: 'Recomendo castanho gelado para equilíbrio.', neutro: 'Recomendo caramelo como tom versátil.' },
                rafael: { default: 'Recomendo linhas suaves para harmonizar seu rosto.', oval: 'Recomendo linhas fluídas e naturais.', quadrado: 'Recomendo linhas curvas para suavizar.', redondo: 'Recomendo linhas verticais para alongar.' }
            };

            const sugestao = sugestoes[agenteId] || sugestoes.arthur;
            const formato = respostas.q1 || '';
            const chave = Object.keys(sugestao).find(k => formato.includes(k)) || 'default';
            return sugestao[chave] || sugestao.default;
        }

                            onclick: function() {

        // ============================================================
        // 16. COMPARTILHAMENTO
        // ============================================================
        function compartilharResultado(agenteId, recomendacoes) {
            const nomeAgente = AGENTES[agenteId]?.nome || 'HairOS';
            const texto = recomendacoes ? recomendacoes.join('\n') : 'Descobri meu estilo ideal com o HairOS! 🥰';

            const mensagem = `🌟 HairOS - Descobri meu estilo ideal!\n\n👤 Especialista: ${nomeAgente}\n📋 Recomendações:\n${texto}\n\n🔗 Experimente também: https://hairos.app`;

            const html = `
                <p>👥 <strong>Compartilhe seu resultado!</strong></p>
                <p style="font-size:12px;color:var(--text-muted);">Mostre para seus amigos o estilo que o HairOS recomendou!</p>
                <div class="share-buttons">
                    <button class="share-btn whatsapp" onclick="window.compartilharWhatsApp('${encodeURIComponent(mensagem)}')">💬 WhatsApp</button>
                    <button class="share-btn instagram" onclick="window.compartilharInstagram()">📸 Instagram</button>
                    <button class="share-btn twitter" onclick="window.compartilharTwitter('${encodeURIComponent(mensagem)}')">🐦 Twitter</button>
                    <button class="share-btn copy" onclick="window.copiarTexto('${encodeURIComponent(mensagem)}')">📋 Copiar</button>
                </div>
            `;

            addMessage(agenteId, html, '', '👥 Compartilhar');

            window.compartilharWhatsApp = function(msg) {
                window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
                addUserMessage('💬 Compartilhado no WhatsApp!');
                salvarHistorico({ agente: 'compartilhar', texto: 'WhatsApp' });
            };

            window.compartilharInstagram = function() {
                addUserMessage('📸 Compartilhado no Instagram (simulado)!');
                addMessage(agenteId, '📸 No Instagram, poste sua foto e marque @HairOS para aparecer no nosso perfil! 🥰', '', 'Instagram');
                salvarHistorico({ agente: 'compartilhar', texto: 'Instagram' });
            };

            window.compartilharTwitter = function(msg) {
                window.open(`https://twitter.com/intent/tweet?text=${msg}`, '_blank');
                addUserMessage('🐦 Compartilhado no Twitter!');
                salvarHistorico({ agente: 'compartilhar', texto: 'Twitter' });
            };

            window.copiarTexto = function(msg) {
                const decoded = decodeURIComponent(msg);
                navigator.clipboard.writeText(decoded).then(() => {
                    addUserMessage('📋 Texto copiado para a área de transferência!');
                    addMessage(agenteId, '✅ Link copiado! Compartilhe com seus amigos. 🥰', '', 'Copiado');
                    salvarHistorico({ agente: 'compartilhar', texto: 'Copiado' });
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = decoded;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    addUserMessage('📋 Texto copiado para a área de transferência!');
                    salvarHistorico({ agente: 'compartilhar', texto: 'Copiado' });
                });
            };

            appendButtons([
                { label: '🔙 Voltar', action: `voltar_menu`, class: 'outline', data: { agente: agenteId } }
            ]);
        }

        // ============================================================
        // 17. HANDLER DE AÇÕES
        // ============================================================
        function handleAction(action, data) {
            removeLastButtons();

            switch (action) {

                case 'ir_para_helena':
                case 'ir_para_arthur':
                case 'ir_para_isabella':
                case 'ir_para_rafael':
                    const id = action.replace('ir_para_', '');
                    if (estado.quiz_ativo) {
                        estado.quiz_ativo = null;
                        estado.quiz_pergunta_atual = 0;
                        estado.quiz_respostas = {};
                    }
                    if (estado.duvidas_ativo) {
                        estado.duvidas_ativo = null;
                    }
                    trocarAgente(id);
                    break;

                case 'iniciar_quiz':
                    const agenteQuiz = data?.agente || estado.especialista_ativo;
                    if (agenteQuiz && QUIZ[agenteQuiz]) {
                        addUserMessage(`📋 Iniciar quiz de ${AGENTES[agenteQuiz].nome}`);
                        setTimeout(() => iniciarQuiz(agenteQuiz), 500);
                    }
                    break;

                case 'iniciar_duvidas':

                        addUserMessage(`❓ Tirar dúvidas com ${AGENTES[agenteDuvidas].nome}`);

                    break;

                case 'analisar_imagem':
                    const agenteAnalise = data?.agente || estado.especialista_ativo;
                    if (!estado.usuario.foto) {
                        addUserMessage('🔍 Analisar imagem');

                                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'primary', data: { agente: agenteAnalise } },
                                        { label: '❓ Tirar dúvidas', action: 'iniciar_duvidas', class: 'outline', data: { agente: agenteAnalise } },
                                        { label: '🔙 Voltar', action: `voltar_menu`, class: 'outline', data: { agente: agenteAnalise } }

        // ============================================================
        // 18. TROCAR AGENTE
        // ============================================================
        function trocarAgente(agenteId) {
            if (estado.quiz_ativo) {
                estado.quiz_ativo = null;
                estado.quiz_pergunta_atual = 0;
                estado.quiz_respostas = {};
            }
            if (estado.duvidas_ativo) {
                estado.duvidas_ativo = null;
            }

            if (estado.especialista_ativo === agenteId && estado.contextos[agenteId]?.interacoes > 0) {
                mostrarOpcoesAgente(agenteId);
                return;
            }

            estado.especialista_ativo = agenteId;
            const agente = AGENTES[agenteId];

            updateIndicators(agenteId, false);

            const interacoes = estado.contextos[agenteId]?.interacoes || 0;

            if (interacoes === 0) {
                addDivider(`${agente.emoji} ${agente.nome.toUpperCase()} — ${agente.role.toUpperCase()}`);
                addMessage(agenteId, agente.saudacao, '', `${agente.role} - 1º contato`);
            } else {
                const respostas = {
                    helena: [
                        'Oi! Estou aqui para te ajudar. O que você precisa agora? 🥰',
                        'Que bom te ver de novo! Como posso ajudar você hoje? 💕',
                        'Olá! Pronta para continuar sua jornada de estilo? Me diga o que precisa! ✨',
                    ],
                    arthur: [
                        'Que bom te ver de novo! Vamos continuar falando sobre cortes? ✂️',
                        'Oi! Já pensou em um Short Bob, Butterfly ou Pixie? São tendência! 🦋',
                        'Voltou! Vamos refinar sua escolha. O que você achou das opções? 💇',
                    ],
                    isabella: [
                        'Que bom te ver de novo! Vamos continuar explorando cores? 🎨',
                        'Oi! Já imaginou como ficaria com um tom mais quente? ✨',
                        'Voltou! Vamos refinar a cor perfeita para você. 🌈',
                    ],
                    rafael: [
                        'Que bom te ver de novo! Vamos continuar explorando sua imagem? 👤',
                        'Oi! A harmonia facial é única. Vamos encontrar o estilo que mais valoriza você! ✨',
                        'Voltou! Vamos refinar sua imagem. O que você achou das análises anteriores? 🎯',
                    ]
                };

                const lista = respostas[agenteId] || [`Olá novamente! Como posso te ajudar? 😊`];
                const idx = Math.min(interacoes - 1, lista.length - 1);
                addMessage(agenteId, lista[idx], '', `${agente.role} - ${interacoes+1}º contato`);
            }

            setTimeout(() => {
                mostrarOpcoesAgente(agenteId);
            }, 600);
        }

                { label: '✂️ Falar com Arthur', action: 'ir_para_arthur', class: 'primary' },
                { label: '🛒 Ver produtos', action: 'ver_produtos', class: 'accent', data: { agente: agenteId } },
                { label: '👥 Compartilhar', action: 'compartilhar', class: 'outline', data: { agente: agenteId } },
                { label: '🔙 Voltar', action: `voltar_menu`, class: 'outline', data: { agente: agenteId } }
            ]);
        }

        // ============================================================
        // 21. FUNÇÕES DOS AGENTES
        // ============================================================

        function pedirFotoPrimeiro(agenteId) {
            const nome = AGENTES[agenteId]?.nome || 'especialista';
            addMessage('helena', `
                <p>Para o ${nome} analisar seu cabelo, preciso que você <strong>envie uma foto</strong> primeiro. 📸</p>
                <p>Clique no botão abaixo para enviar sua foto.</p>
                <div class="photo-upload">
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                        📷 Enviar Foto
                    </button>
                </div>
                <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">Após enviar, os especialistas farão uma reunião para analisar!</p>
            `, '', 'Recepcionista');
            appendButtons([
                { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                { label: '👋 Voltar', action: `ir_para_${agenteId}`, class: 'outline' }
            ]);
        }

        // ============================================================
        // 22. INPUT DO USUÁRIO
        // ============================================================
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function handleUserText() {
            const text = userInput.value.trim();
            if (!text) return;

            if (estado.meeting_ativa) {
                addUserMessage(text);
                setTimeout(() => {
                    addMessage('helena', '⏳ Aguarde um momento, nossa equipe está em reunião analisando sua foto!', '', 'Recepcionista');
                }, 500);
                userInput.value = '';
                return;
            }

            addUserMessage(text);
            userInput.value = '';

            const lower = text.toLowerCase();

            if (estado.quiz_ativo) {
                const quiz = QUIZ[estado.quiz_ativo];
                const idx = estado.quiz_pergunta_atual;
                if (quiz && idx < quiz.perguntas.length) {
                    const pergunta = quiz.perguntas[idx];
                    const opcaoEncontrada = pergunta.opcoes.find(op =>
                        lower.includes(op.label.toLowerCase()) ||
                        lower.includes(op.valor.toLowerCase())
                    );
                    if (opcaoEncontrada) {
                        responderQuiz(estado.quiz_ativo, idx, opcaoEncontrada.valor);
                        return;
                    }
                }
                if (estado.quiz_pergunta_atual < QUIZ[estado.quiz_ativo].perguntas.length) {
                    estado.quiz_pergunta_atual++;
                    removeLastButtons();
                    setTimeout(() => mostrarPerguntaQuiz(estado.quiz_ativo), 500);
                    return;
                }
            }

            if (lower.includes('sugestao') || lower.includes('sugestão') || lower.includes('cortes')) {
                if (estado.especialista_ativo) {
                    verSugestoes(estado.especialista_ativo);
                }
                return;
            }

            if (lower.includes('quiz') || lower.includes('teste') || lower.includes('pergunta')) {
                if (estado.especialista_ativo && QUIZ[estado.especialista_ativo]) {
                    setTimeout(() => iniciarQuiz(estado.especialista_ativo), 500);
                } else {
                    addMessage('helena', 'Qual especialista você quer consultar? Escolha abaixo:', '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                    ]);
                }
                return;
            }

            if (lower.includes('duvida') || lower.includes('pergunta') || lower.includes('?')) {
                if (estado.especialista_ativo && DUVIDAS[estado.especialista_ativo]) {
                    setTimeout(() => iniciarDuvidas(estado.especialista_ativo), 500);
                } else {
                    addMessage('helena', 'Qual especialista você quer consultar? Escolha abaixo:', '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                    ]);
                }
                return;
            }

            if (lower.includes('produto') || lower.includes('comprar') || lower.includes('catalogo') || lower.includes('catálogo')) {
                if (estado.especialista_ativo && estado.especialista_ativo !== 'helena') {
                    setTimeout(() => mostrarProdutos(estado.especialista_ativo), 500);
                } else {
                    addMessage('helena', 'Qual especialista você quer consultar para ver produtos?', '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                    ]);
                }
                return;
            }

            if (lower.includes('compartilhar') || lower.includes('compartilha')) {
                if (estado.especialista_ativo) {
                    setTimeout(() => compartilharResultado(estado.especialista_ativo, ['Resultado do HairOS']), 500);
                } else {
                    setTimeout(() => compartilharResultado('helena', ['Descubra seu estilo com o HairOS! 🥰']), 500);
                }
                return;
            }

            if (lower.includes('historico') || lower.includes('histórico')) {
                handleAction('menu_history');
                return;
            }

            if (estado.especialista_ativo && estado.especialista_ativo !== 'helena') {
                const agente = estado.especialista_ativo;
                if (lower.includes('analisar') || lower.includes('imagem') || lower.includes('foto')) {
                    handleAction('analisar_imagem', { agente });
                } else if (lower.includes('voltar') || lower.includes('menu')) {
                    mostrarOpcoesAgente(agente);
                } else {
                    const respostas = {
                        arthur: 'Posso te ajudar com análise de imagem, quiz, dúvidas, produtos ou compartilhamento. O que você prefere? ✂️',
                        isabella: 'Posso te ajudar com análise de imagem, quiz, dúvidas, produtos ou compartilhamento. O que você prefere? 🎨',
                        rafael: 'Posso te ajudar com análise de imagem, quiz, dúvidas, produtos ou compartilhamento. O que você prefere? 👤'
                    };
                    addMessage(agente, respostas[agente] || 'Como posso te ajudar hoje? 😊', '', AGENTES[agente].role);
                    mostrarOpcoesAgente(agente);
                }
                return;
            }

            if (lower.includes('corte') || lower.includes('tesoura')) {
                handleAction('ir_para_arthur');
            } else if (lower.includes('cor') || lower.includes('pintar') || lower.includes('balayage')) {
                handleAction('ir_para_isabella');
            } else if (lower.includes('rosto') || lower.includes('estilo') || lower.includes('imagem') || lower.includes('visag')) {
                handleAction('ir_para_rafael');
            } else {
                addMessage('helena', `
                    <p>Que legal! 🥰</p>
                    <p>Posso te ajudar com:</p>
                    <p>• 📸 <strong>Enviar foto</strong> para análise dos especialistas</p>
                    <p>• ✂️ Cortes com o <strong>Arthur</strong></p>
                    <p>• 🎨 Cores com a <strong>Isabella</strong></p>
                    <p>• 👤 Visagismo com o <strong>Rafael</strong></p>
                    <p>• 📋 <strong>Quiz de 5 perguntas</strong> para sugestões de cortes</p>
                    <p>• ❓ <strong>5 dúvidas frequentes</strong> por especialista</p>
                    <p>• 🛒 <strong>Catálogo de produtos</strong> recomendados</p>
                    <p>• 👥 <strong>Compartilhamento social</strong></p>
                    <p style="font-size:12px;color:var(--text-muted);">Escolha uma opção abaixo:</p>
                `, '', 'Recepcionista');
                appendButtons([
                    { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                    { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'outline' },
                    { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                    { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                ]);
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleUserText();
        });
        sendBtn.addEventListener('click', handleUserText);

        // ============================================================
        // 23. UPLOAD AVATAR
        // ============================================================
        function triggerAvatarUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const url = ev.target.result;
                        estado.usuario.avatarUrl = url;
                        document.documentElement.style.setProperty('--user-avatar', `url('${url}')`);
                        document.querySelectorAll('.avatar.user, .profile-avatar').forEach(el => {
                            el.style.backgroundImage = `url('${url}')`;
                        });
                        document.getElementById('profileAvatar').style.backgroundImage = `url('${url}')`;
                        addUserMessage('🖼️ Meu novo avatar!');
                        setTimeout(() => {
                            addMessage('helena', 'Que legal! Agora seu perfil está ainda mais personalizado. 🥰', '', 'Recepcionista');
                        }, 400);
                        closeMenu();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        document.getElementById('profileUploadBtn').addEventListener('click', triggerAvatarUpload);

        // ============================================================
        // 24. MENU - AÇÕES
        // ============================================================
        document.getElementById('menuReset').addEventListener('click', () => {
            reiniciar();
        });

        document.getElementById('menuHistory').addEventListener('click', () => {
            handleAction('menu_history');
        });

        document.getElementById('menuHelp').addEventListener('click', () => {
            closeMenu();
            addMessage('helena', `
                <p>💡 <strong>Dicas rápidas - HairOS</strong></p>
                <p>• 📸 <strong>Envie uma foto</strong> para análise personalizada</p>
                <p>• 🎙️ <strong>Reunião dos especialistas</strong> — Arthur, Isabella e Rafael analisam sua foto</p>
                <p>• 📋 <strong>Quiz de 5 perguntas</strong> para completar sua análise</p>
                <p>• ✂️ <strong>3 sugestões de cortes</strong> com imagens após o quiz</p>
                <p>• ❓ <strong>5 dúvidas frequentes</strong> por especialista</p>
                <p>• 🛒 <strong>Catálogo de produtos</strong> recomendados para seu estilo</p>
                <p>• 👥 <strong>Compartilhamento social</strong> — WhatsApp, Instagram, Twitter</p>
                <p>• 📊 <strong>Histórico do cliente</strong> — todas as interações salvas</p>
                <p>• Clique no <strong>logo</strong> ou nos <strong>especialistas</strong> para saber mais</p>
                <p>• Use o menu ☰ para trocar tema ou ver histórico ✨</p>
            `, '', 'Recepcionista - Ajuda');
        });

        // ============================================================
        // 25. REINICIAR
        // ============================================================
        function reiniciar() {
            estado = {
                passo: 'boas_vindas',
                especialista_ativo: null,
                usuario: {
                    foto: false,
                    corte: null,
                    cor: null,
                    avatarUrl: estado.usuario.avatarUrl,
                    quiz: { arthur: {}, isabella: {}, rafael: {} },
                    nome: 'Cliente'
                },
                meeting_ativa: false,
                contextos: {
                    helena: { interacoes: 0 },
                    arthur: { interacoes: 0 },
                    isabella: { interacoes: 0 },
                    rafael: { interacoes: 0 },
                },
                ultima_pergunta: null,
                historico: estado.historico,
                quiz_ativo: null,
                quiz_pergunta_atual: 0,
                quiz_respostas: {},
                duvidas_ativo: null,
                duvidas_pergunta_atual: 0,
                analise_realizada: false,
                sugestoes_cortes: [],
            };
            const msgs = messagesEl.querySelectorAll('.message, .divider, .meeting-badge');
            msgs.forEach(el => el.remove());
            setTimeout(() => boasVindas(), 300);
            closeMenu();
        }

        // ============================================================
        // 26. BOAS-VINDAS
        // ============================================================
        function boasVindas() {
            addMeetingBadge('👋 HAIROS — CONSULTORIA CAPILAR INTELIGENTE');
            addMessage('helena', `
                <p>Oi! Tudo bem? Sou a <strong>Helena</strong>, sua recepcionista. 🥰</p>
                <p>Para começar, <strong>me envie uma foto do seu cabelo</strong> para que nossa equipe de especialistas possa analisar.</p>
                <div class="photo-upload">
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                        📷 Enviar Foto
                    </button>
                </div>
                <p style="margin-top:8px;font-size:12px;color:var(--text-muted);">Após enviar, os especialistas farão uma reunião para analisar!</p>
            `, '', 'Recepcionista - Boas-vindas');
            appendButtons([
                { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'outline' },
                { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'outline' },
                { label: '👤 Rafael (Visagismo)', action: 'ir_para_rafael', class: 'outline' }
            ]);
            estado.passo = 'boas_vindas';

            const existingInput = document.getElementById('fileInput');
            if (!existingInput) {
                const input = document.createElement('input');
                input.type = 'file';
                input.id = 'fileInput';
                input.accept = 'image/*';
                input.style.display = 'none';
                input.addEventListener('change', function(e) {
                    if (this.files && this.files[0]) handleAction('foto_enviada');
                });
                document.body.appendChild(input);
            }

            atualizarMenuHistorico();
            atualizarBadgeHistorico();
        }

        // ============================================================
        // 27. INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(boasVindas, 400);
            setTimeout(() => {
                const allAgents = ['helena', 'arthur', 'isabella', 'rafael'];
                animateAgentConversation(allAgents, 2000);
            }, 600);

            window.ver_sugestoes = function(data) {
                const agente = data?.agente || estado.especialista_ativo;
                if (agente) verSugestoes(agente);
            };

            atualizarMenuHistorico();
            atualizarBadgeHistorico();
        });
    </script>

</body>
</html>
