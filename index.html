<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HairOS — Salão Inteligente</title>

    <style>
        /* ============================================================
           VARIÁVEIS E TEMA
           ============================================================ */
        :root {
            --bg-body: #f5f0eb;
            --bg-chat: #ffffff;
            --bg-header: #1a1a1a;
            --bg-messages: #faf8f6;
            --bg-bubble-user: #1a1a1a;
            --bg-bubble-bot: #ffffff;
            --bg-input: #faf8f6;
            --bg-btn-primary: #1a1a1a;
            --bg-btn-primary-hover: #333;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #f5f0eb;
            --bg-tag: #f0ebe6;
            --bg-tag-highlight: #d4a57422;
            --bg-divider: transparent;
            --bg-meeting: #d4a57422;
            --bg-menu: #1a1a1a;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --text-white: #fff;
            --text-bubble-user: #fff;
            --text-bubble-bot: #1a1a1a;
            --text-header: #fff;
            --text-header-muted: #888;
            --text-accent: #b8834a;
            --text-menu: #fff;
            --border-input: #e8e0da;
            --border-input-focus: #d4a574;
            --border-bubble: transparent;
            --border-btn-outline: #ddd;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0,0,0,0.06);
            --shadow-chat: 0 20px 60px rgba(0,0,0,0.12);
            --shadow-menu: 0 8px 30px rgba(0,0,0,0.4);
            --shadow-modal: 0 25px 80px rgba(0,0,0,0.5);
            --avatar-helena: linear-gradient(135deg, #e8b4a0, #d49a82);
            --avatar-arthur: linear-gradient(135deg, #7ec8d4, #4a9aa8);
            --avatar-isabella: linear-gradient(135deg, #f0a8c4, #d4789a);
            --avatar-rafael: linear-gradient(135deg, #b8a0c8, #8e76a8);
            --avatar-user: linear-gradient(135deg, #ccc, #999);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #d4a574;
        }

        [data-theme="dark"] {
            --bg-body: #0d0d0d;
            --bg-chat: #1a1a1a;
            --bg-header: #0d0d0d;
            --bg-messages: #141414;
            --bg-bubble-user: #2a2a2a;
            --bg-bubble-bot: #1e1e1e;
            --bg-input: #1a1a1a;
            --bg-btn-primary: #d4a574;
            --bg-btn-primary-hover: #c49464;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #2a2a2a;
            --bg-tag: #2a2a2a;
            --bg-tag-highlight: #d4a57433;
            --bg-divider: transparent;
            --bg-meeting: #d4a57433;
            --bg-menu: #0d0d0d;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --text-muted: #666;
            --text-white: #fff;
            --text-bubble-user: #f0f0f0;
            --text-bubble-bot: #f0f0f0;
            --text-header: #fff;
            --text-header-muted: #666;
            --text-accent: #d4a574;
            --text-menu: #f0f0f0;
            --border-input: #333;
            --border-input-focus: #d4a574;
            --border-bubble: #2a2a2a;
            --border-btn-outline: #444;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0,0,0,0.3);
            --shadow-chat: 0 20px 60px rgba(0,0,0,0.5);
            --shadow-menu: 0 8px 30px rgba(0,0,0,0.7);
            --shadow-modal: 0 25px 80px rgba(0,0,0,0.7);
            --avatar-helena: linear-gradient(135deg, #c4947a, #b8834a);
            --avatar-arthur: linear-gradient(135deg, #5a9aa8, #3a7a88);
            --avatar-isabella: linear-gradient(135deg, #d4789a, #b85a7a);
            --avatar-rafael: linear-gradient(135deg, #8e76a8, #6a5a88);
            --avatar-user: linear-gradient(135deg, #555, #333);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 780px;
            background: var(--bg-chat);
            border-radius: 32px;
            box-shadow: var(--shadow-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .chat-header {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            transition: background 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .chat-header .logo {
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }
        .chat-header .logo:hover { opacity: 0.8; }
        .chat-header .logo span { color: #d4a574; }
        .chat-header .status {
            font-size: 11px;
            color: var(--text-header-muted);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
        }
        .chat-header .status .dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .menu-btn {
            background: none; border: none;
            color: var(--text-header-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            line-height: 1;
        }
        .menu-btn:hover { color: var(--text-header); }

        .agent-indicators {
            display: flex;
            gap: 6px;
            margin-left: 6px;
            align-items: center;
        }
        .agent-indicators .indicator {
            width: 28px; height: 28px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        .agent-indicators .indicator:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.3);
        }
        .agent-indicators .indicator.active {
            border-color: #d4a574;
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(212,165,116,0.5);
        }
        .agent-indicators .indicator.speaking {
            animation: speak-pulse 0.8s ease-in-out infinite alternate;
            border-color: #4ade80;
            box-shadow: 0 0 16px rgba(74,222,128,0.6);
        }
        @keyframes speak-pulse {
            0% { transform: scale(1); box-shadow: 0 0 8px rgba(74,222,128,0.3); }
            100% { transform: scale(1.15); box-shadow: 0 0 20px rgba(74,222,128,0.8); }
        }
        .agent-indicators .indicator .wave-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: ring-wave 1.2s ease-out infinite;
            pointer-events: none;
        }
        .agent-indicators .indicator.speaking .wave-ring {
            border-color: rgba(74,222,128,0.4);
        }
        @keyframes ring-wave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .agent-indicators .indicator .agent-label {
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .agent-indicators .indicator:hover .agent-label { opacity: 1; }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-chat);
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-modal);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
            position: relative;
        }
        .modal-overlay.open .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-content .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
            line-height: 1;
        }
        .modal-content .modal-close:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }
        .modal-content .modal-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            display: block;
        }
        .modal-content .modal-body {
            padding: 24px 28px 28px 28px;
        }
        .modal-content .modal-body .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .modal-content .modal-body .modal-subtitle {
            font-size: 13px;
            color: var(--text-accent);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .modal-content .modal-body .modal-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .modal-content .modal-body .modal-btn {
            background: var(--bg-btn-primary);
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            width: 100%;
        }
        .modal-content .modal-body .modal-btn:hover {
            background: var(--bg-btn-primary-hover);
            transform: translateY(-2px);
        }

        /* ============================================================
           MENU LATERAL
           ============================================================ */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .menu-overlay.open { opacity: 1; pointer-events: all; }
        .menu-panel {
            position: absolute;
            top: 0; left: 0;
            width: 260px;
            height: 100%;
            background: var(--bg-menu);
            box-shadow: var(--shadow-menu);
            z-index: 100;
            transform: translateX(-110%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 0 20px 20px 0;
            overflow-y: auto;
        }
        .menu-panel.open { transform: translateX(0); }
        .menu-panel .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-menu);
        }
        .menu-panel .menu-header span {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-menu);
        }
        .menu-panel .menu-close {
            background: none; border: none;
            color: var(--text-header-muted);
            font-size: 20px;
            cursor: pointer;
        }
        .menu-panel .menu-close:hover { color: var(--text-header); }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-menu);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            text-align: left;
        }
        .menu-item:hover { background: var(--bg-menu-item-hover); }
        .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .menu-item .label { flex: 1; }
        .menu-item .badge {
            font-size: 11px;
            background: rgba(212,165,116,0.25);
            color: var(--text-accent);
            padding: 2px 10px;
            border-radius: 12px;
        }
        .menu-divider { height: 1px; background: var(--border-menu); margin: 4px 0; }
        .menu-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            margin-bottom: 4px;
        }
        .menu-profile .profile-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--avatar-user);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 2px solid var(--border-menu);
        }
        .menu-profile .profile-name { color: var(--text-menu); font-weight: 600; font-size: 14px; }
        .menu-profile .profile-sub { color: var(--text-header-muted); font-size: 11px; }
        .menu-profile .profile-upload {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border-menu);
            color: var(--text-header-muted);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .menu-profile .profile-upload:hover {
            background: var(--bg-menu-item-hover);
            color: var(--text-menu);
        }

        /* ============================================================
           MENSAGENS
           ============================================================ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-messages);
            transition: background 0.3s ease;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 92%;
            animation: fade-in 0.3s ease;
        }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-indent: -9999px;
        }
        .avatar.helena { background-image: url('https://images.unsplash.com/photo-1580618672591-eb180b1a973f?w=80&h=80&fit=crop&crop=face'); }
        .avatar.arthur { background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face'); }
        .avatar.isabella { background-image: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?w=80&h=80&fit=crop&crop=face'); }
        .avatar.rafael { background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=80&h=80&fit=crop&crop=face'); }
        .avatar.user {
            background-image: var(--user-avatar, url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&h=80&fit=crop&crop=face'));
            background-size: cover;
            font-size: 14px;
            text-indent: -9999px;
        }
        .avatar.system {
            background: var(--avatar-system);
            font-size: 12px;
            text-indent: 0;
        }

        .bubble {
            background: var(--bg-bubble-bot);
            padding: 10px 14px;
            border-radius: 14px;
            border-top-left-radius: 4px;
            box-shadow: var(--shadow-bubble);
            line-height: 1.5;
            font-size: 13.5px;
            color: var(--text-bubble-bot);
            flex: 1;
            border: 1px solid var(--border-bubble);
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .message.user .bubble {
            background: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-top-left-radius: 14px;
            border-top-right-radius: 4px;
            border-color: transparent;
        }
        .bubble .agent-name {
            font-weight: 700;
            font-size: 12px;
            display: block;
            margin-bottom: 1px;
            color: var(--text-primary);
        }
        .bubble .agent-role {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            margin-bottom: 3px;
        }
        .bubble .agent-desc {
            font-size: 11px;
            color: var(--text-accent);
            font-weight: 500;
            display: inline-block;
            margin-bottom: 4px;
            padding: 3px 10px;
            background: var(--bg-tag-highlight);
            border-radius: 8px;
        }
        .bubble .text { margin-top: 2px; color: var(--text-primary); }
        .bubble .text p { margin-bottom: 5px; }
        .bubble .text p:last-child { margin-bottom: 0; }
        .bubble .agent-context {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid var(--border-input);
        }

        .hair-image {
            width: 100%;
            border-radius: 12px;
            margin: 6px 0 8px 0;
            display: block;
            border: 1px solid var(--border-input);
            max-height: 200px;
            object-fit: cover;
        }
        .hair-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 6px 0 8px 0;
        }
        .hair-grid .hair-image {
            margin: 0;
            max-height: 120px;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .quick-buttons .btn {
            background: var(--bg-btn-outline);
            border: 1.5px solid var(--border-btn-outline);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
        }
        .quick-buttons .btn:hover {
            background: var(--bg-btn-outline-hover);
            transform: translateY(-1px);
        }
        .quick-buttons .btn.primary {
            background: var(--bg-btn-primary);
            color: #fff;
            border-color: var(--bg-btn-primary);
        }
        .quick-buttons .btn.primary:hover {
            background: var(--bg-btn-primary-hover);
            border-color: var(--bg-btn-primary-hover);
        }
        .quick-buttons .btn.accent {
            background: var(--bg-btn-accent);
            color: #fff;
            border-color: var(--bg-btn-accent);
        }
        .quick-buttons .btn.accent:hover {
            background: var(--bg-btn-accent-hover);
            border-color: var(--bg-btn-accent-hover);
        }
        .quick-buttons .btn.outline {
            background: var(--bg-btn-outline);
            border-color: var(--border-btn-outline);
            color: var(--text-secondary);
        }
        .quick-buttons .btn.outline:hover {
            border-color: var(--text-accent);
            background: var(--bg-btn-outline-hover);
        }
        .quick-buttons .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .quick-buttons .btn.success {
            background: #4ade80;
            color: #000;
            border-color: #4ade80;
        }
        .quick-buttons .btn.success:hover {
            background: #22c55e;
            border-color: #22c55e;
        }

        .divider {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 3px 0;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--bg-divider);
            transition: color 0.3s ease;
        }
        .meeting-badge {
            display: block;
            text-align: center;
            background: var(--bg-meeting);
            color: var(--text-accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin: 4px 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .photo-upload {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .photo-upload .btn { flex: 1; justify-content: center; }

        .chat-input {
            padding: 10px 14px 14px 14px;
            background: var(--bg-chat);
            border-top: 1px solid var(--border-input);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .chat-input input {
            flex: 1;
            padding: 9px 14px;
            border: 1.5px solid var(--border-input);
            border-radius: 24px;

        const messagesEl = document.getElementById('messages');

        function scrollToBottom() {
            setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
        }

        function updateIndicators(agenteId, speaking = false) {
            indicators.forEach(el => {
                const isTarget = el.dataset.agent === agenteId;
                el.classList.toggle('active', isTarget);
                el.classList.toggle('speaking', speaking && isTarget);
            });
        }

        function animateAgentConversation(agentes, duration = 2000) {
            let index = 0;
            const interval = setInterval(() => {
                indicators.forEach(el => el.classList.remove('speaking', 'active'));
                const current = agentes[index % agentes.length];
                const el = document.querySelector(`.indicator[data-agent="${current}"]`);
                if (el) {
                    el.classList.add('speaking', 'active');
                }
                index++;
                if (index >= agentes.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        indicators.forEach(el => {
                            el.classList.remove('speaking', 'active');
                            if (el.dataset.agent === 'helena') el.classList.add('active');
                        });
                    }, 400);
                }
            }, duration / agentes.length);
        }

        function addMessage(agenteId, html, extraClass = '', contexto = null, imagens = null) {
            const agente = AGENTES[agenteId];
            if (!agente) return;
            const div = document.createElement('div');
            div.className = `message bot ${extraClass}`;
            let contextHtml = '';
            if (contexto) {
                contextHtml = `<div class="agent-context">💭 ${contexto}</div>`;

            let imagesHtml = '';
            if (imagens) {
                if (Array.isArray(imagens)) {
                    imagesHtml = `<div class="hair-grid">${imagens.map(img => `<img src="${img}" class="hair-image" alt="Referência" loading="lazy" />`).join('')}</div>`;

                    imagesHtml = `<img src="${imagens}" class="hair-image" alt="Referência" loading="lazy" />`;

        function createButtons(buttons) {
            const container = document.createElement('div');
            container.className = 'quick-buttons';
            buttons.forEach(btn => {
                const el = document.createElement('button');
                el.className = `btn ${btn.class || ''}`;
                el.textContent = btn.label;
                el.dataset.action = btn.action;
                if (btn.disabled) el.disabled = true;
                if (btn.onclick) {
                    el.addEventListener('click', btn.onclick);
                } else if (btn.action) {
                    el.addEventListener('click', () => {
                        if (btn.action) handleAction(btn.action, btn.data);
                    });
                }
                container.appendChild(el);
            });
            return container;
        }

        function appendButtons(buttons) {
            const msgs = messagesEl.querySelectorAll('.message.bot');
            if (msgs.length === 0) return;
            const last = msgs[msgs.length - 1];
            const bubble = last.querySelector('.bubble');
            if (bubble) {
                const existing = bubble.querySelector('.quick-buttons');
                if (existing) existing.remove();
                bubble.appendChild(createButtons(buttons));
            }
        }

        function removeMessagesByKeyword(keyword) {
            const msgs = messagesEl.querySelectorAll('.message');
            let removidas = 0;
            for (let i = msgs.length - 1; i >= 0; i--) {
                const msg = msgs[i];
                const text = msg.querySelector('.text')?.textContent || '';
                if (text.includes(keyword)) {
                    msg.remove();
                    removidas++;
                    if (removidas > 15) break;
                }
            }
        }

                return;
            }

            const pergunta = quiz.perguntas[idx];
            const progresso = `${idx + 1}/${quiz.perguntas.length}`;

            const botoes = pergunta.opcoes.map((op, i) => ({
                label: op.label,
                class: 'outline',
                onclick: function() {
                    responderQuiz(agenteId, idx, op.valor);
                }
            }));

            if (idx > 0) {
                botoes.push({
                    label: '⬅️ Anterior',
                    class: 'outline',
                    onclick: function() {
                        if (estado.quiz_pergunta_atual > 0) {
                            estado.quiz_pergunta_atual--;
                            removeLastMessage();
                            const userMsgs = messagesEl.querySelectorAll('.message.user');
                            if (userMsgs.length > 0) {
                                const lastUser = userMsgs[userMsgs.length - 1];
                                if (lastUser) lastUser.remove();
                            }
                            setTimeout(() => mostrarPerguntaQuiz(agenteId), 300);
                        }
                    }
                });
            }

            addMessage(agenteId, `
                <p><strong>${pergunta.pergunta}</strong></p>
                <p style="font-size:11px;color:var(--text-muted);">Pergunta ${progresso}</p>
            `, '', `Quiz - ${quiz.titulo}`);

            appendButtons(botoes);
        }

        function responderQuiz(agenteId, idx, valor) {
            const quiz = QUIZ[agenteId];
            const pergunta = quiz.perguntas[idx];

            estado.quiz_respostas[pergunta.id] = valor;
            estado.usuario.quiz[agenteId] = estado.quiz_respostas;

            const opcaoSelecionada = pergunta.opcoes.find(op => op.valor === valor);
            addUserMessage(`📌 ${opcaoSelecionada ? opcaoSelecionada.label : 'Respondido'}`);

            estado.quiz_pergunta_atual++;
            removeLastButtons();

            setTimeout(() => {
                mostrarPerguntaQuiz(agenteId);
            }, 500);
        }

        function finalizarQuiz(agenteId) {
            const quiz = QUIZ[agenteId];
            const respostas = estado.quiz_respostas;
            const recomendacoes = quiz.resultado(respostas);
            const imagemRef = quiz.getImagemRecomendacao ? quiz.getImagemRecomendacao(respostas) : null;

            let html = `
                <p>✅ <strong>Quiz finalizado!</strong></p>
                <p>Com base nas suas respostas, aqui estão as recomendações:</p>
                <ul style="margin:8px 0 0 16px; padding-left:4px;">
            `;

            recomendacoes.forEach(r => {
                html += `<li style="margin-bottom:4px;">${r}</li>`;
            });

            html += `</ul>`;

            const recomendacaoFinal = gerarRecomendacaoFinal(agenteId, respostas);

            html += `
                <p style="margin-top:10px;padding:10px;background:var(--bg-tag-highlight);border-radius:8px;">
                    📸 <strong>Análise combinada com sua foto:</strong><br>
                    ${recomendacaoFinal}
                </p>
                <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    ✅ Análise completa! Abaixo uma imagem de referência para seu estilo.
                </p>
            `;

            addMessage(agenteId, html, '', `Resultado do quiz - ${quiz.titulo}`, imagemRef);

            const botoes = [
                { label: '🔄 Recomeçar quiz', onclick: function() {
                    estado.quiz_ativo = null;
                    estado.quiz_pergunta_atual = 0;
                    estado.quiz_respostas = {};
                    removeMessagesByKeyword('Quiz');
                    removeMessagesByKeyword('Pergunta');
                    removeMessagesByKeyword('Resultado');
                    setTimeout(() => iniciarQuiz(agenteId), 500);
                }, class: 'outline' },
                { label: '🔙 Voltar ao menu', onclick: function() {
                    estado.quiz_ativo = null;
                    estado.quiz_pergunta_atual = 0;
                    estado.quiz_respostas = {};
                    mostrarOpcoesAgente(agenteId);
                }, class: 'outline' },
            ];

            appendButtons(botoes);
            estado.quiz_ativo = null;
        }

        function gerarRecomendacaoFinal(agenteId, respostas) {
            const sugestoes = {
                arthur: {
                    default: 'Recomendo um Short Bob com camadas leves para valorizar seu rosto.',
                    oval: 'Recomendo Butterfly com camadas suaves para movimento.',
                    quadrado: 'Recomendo cortes com franja lateral para suavizar.',
                    redondo: 'Recomendo Pixie assimétrico com volume no topo.',
                },
                isabella: {
                    default: 'Recomendo mel com reflexos para iluminar seu rosto.',
                    quente: 'Recomendo cobre acobreado para realçar seu tom de pele.',
                    frio: 'Recomendo castanho gelado para equilíbrio.',
                    neutro: 'Recomendo caramelo como tom versátil.',
                },
                rafael: {
                    default: 'Recomendo linhas suaves para harmonizar seu rosto.',
                    oval: 'Recomendo linhas fluídas e naturais.',
                    quadrado: 'Recomendo linhas curvas para suavizar.',
                    redondo: 'Recomendo linhas verticais para alongar.',
                }
            };

            const sugestao = sugestoes[agenteId] || sugestoes.arthur;
            const formato = respostas.q1 || '';
            const chave = Object.keys(sugestao).find(k => formato.includes(k)) || 'default';
            return sugestao[chave] || sugestao.default;
        }

        // ============================================================
        // 11. DÚVIDAS - LÓGICA COMPLETA (5 PERGUNTAS)
        // ============================================================
        function iniciarDuvidas(agenteId) {
            const duvidas = DUVIDAS[agenteId];
            if (!duvidas) return;

            estado.duvidas_ativo = agenteId;
            estado.duvidas_pergunta_atual = 0;

            if (estado.especialista_ativo !== agenteId) {
                trocarAgente(agenteId);
            }

            setTimeout(() => {
                addMessage(agenteId, `
                    <p>${duvidas.titulo}</p>
                    <p>Escolha uma das perguntas abaixo para saber mais! 🥰</p>
                    <p style="font-size:12px;color:var(--text-muted);">Clique em uma pergunta para ver a resposta.</p>
                `, '', 'Dúvidas');
                mostrarPerguntaDuvidas(agenteId);
            }, 800);
        }

        function mostrarPerguntaDuvidas(agenteId) {
            const duvidas = DUVIDAS[agenteId];
            const perguntas = duvidas.perguntas;

            const botoes = perguntas.map((p, idx) => ({
                label: p.pergunta,
                class: 'outline',
                onclick: function() {
                    addUserMessage(`❓ ${p.pergunta}`);
                    addMessage(agenteId, `
                        <p><strong>📌 ${p.pergunta}</strong></p>
                        <p style="white-space:pre-line;margin-top:6px;">${p.resposta}</p>
                        <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">Quer ver outra dúvida?</p>
                    `, '', `Dúvida respondida`);
                    setTimeout(() => {
                        const botoesVoltar = perguntas.map((p2, idx2) => ({
                            label: p2.pergunta,
                            class: idx2 === idx ? 'success' : 'outline',
                            onclick: function() {
                                addUserMessage(`❓ ${p2.pergunta}`);
                                addMessage(agenteId, `
                                    <p><strong>📌 ${p2.pergunta}</strong></p>
                                    <p style="white-space:pre-line;margin-top:6px;">${p2.resposta}</p>
                                    <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">Quer ver outra dúvida?</p>
                                `, '', `Dúvida respondida`);
                                setTimeout(() => {
                                    const botoesNovamente = perguntas.map((p3, idx3) => ({
                                        label: p3.pergunta,
                                        class: idx3 === idx2 ? 'success' : 'outline',
                                        onclick: function() {
                                            mostrarPerguntaDuvidas(agenteId);
                                        }
                                    }));
                                    botoesNovamente.push({
                                        label: '🔙 Voltar ao menu',
                                        class: 'primary',
                                        onclick: function() {
                                            estado.duvidas_ativo = null;
                                            mostrarOpcoesAgente(agenteId);
                                        }
                                    });
                                    appendButtons(botoesNovamente);
                                }, 300);
                            }
                        }));
                        botoesVoltar.push({
                            label: '🔙 Voltar ao menu',
                            class: 'primary',
                            onclick: function() {
                                estado.duvidas_ativo = null;
                                mostrarOpcoesAgente(agenteId);
                            }
                        });
                        appendButtons(botoesVoltar);
                    }, 300);
                }
            }));

            botoes.push({
                label: '🔙 Voltar ao menu',
                class: 'primary',
                onclick: function() {
                    estado.duvidas_ativo = null;
                    mostrarOpcoesAgente(agenteId);
                }
            });

            addMessage(agenteId, `
                <p style="font-size:12px;color:var(--text-muted);">Escolha uma pergunta:</p>
            `, '', 'Dúvidas - lista');

            appendButtons(botoes);
        }

        // ============================================================
        // 12. HANDLER DE AÇÕES
        // ============================================================
        function handleAction(action, data) {
            removeLastButtons();

            switch (action) {

                case 'ir_para_helena':
                case 'ir_para_arthur':
                case 'ir_para_isabella':
                case 'ir_para_rafael':
                    const id = action.replace('ir_para_', '');
                    if (estado.quiz_ativo) {
                        estado.quiz_ativo = null;
                        estado.quiz_pergunta_atual = 0;
                        estado.quiz_respostas = {};
                    }
                    if (estado.duvidas_ativo) {
                        estado.duvidas_ativo = null;
                    }
                    trocarAgente(id);
                    break;

                case 'iniciar_quiz':
                    const agenteQuiz = data?.agente || estado.especialista_ativo;
                    if (agenteQuiz && QUIZ[agenteQuiz]) {
                        addUserMessage(`📋 Iniciar quiz de ${AGENTES[agenteQuiz].nome}`);
                        setTimeout(() => iniciarQuiz(agenteQuiz), 500);
                    }
                    break;

                case 'iniciar_duvidas':
                    const agenteDuvidas = data?.agente || estado.especialista_ativo;
                    if (agenteDuvidas && DUVIDAS[agenteDuvidas]) {
                        addUserMessage(`❓ Tirar dúvidas com ${AGENTES[agenteDuvidas].nome}`);
                        setTimeout(() => iniciarDuvidas(agenteDuvidas), 500);
                    }
                    break;

                case 'analisar_imagem':
                    const agenteAnalise = data?.agente || estado.especialista_ativo;
                    if (!estado.usuario.foto) {
                        addUserMessage('🔍 Analisar imagem');
                        setTimeout(() => pedirFotoPrimeiro(agenteAnalise), 400);
                    } else {
                        addUserMessage('🔍 Analisar imagem');
                        setTimeout(() => {
                            if (agenteAnalise === 'arthur') arthurAnalisar();
                            else if (agenteAnalise === 'isabella') isabellaAnalisar();
                            else if (agenteAnalise === 'rafael') rafaelAnalisar();
                        }, 500);
                    }
                    break;

                case 'voltar_menu':
                    const agenteVoltar = data?.agente || estado.especialista_ativo;
                    if (estado.quiz_ativo) {
                        estado.quiz_ativo = null;
                        estado.quiz_pergunta_atual = 0;
                        estado.quiz_respostas = {};
                    }
                    if (estado.duvidas_ativo) {
                        estado.duvidas_ativo = null;
                    }
                    if (agenteVoltar) mostrarOpcoesAgente(agenteVoltar);
                    break;

                case 'enviar_foto':
                    document.getElementById('fileInput')?.click();
                    break;

                case 'foto_enviada':
                    estado.usuario.foto = true;
                    addUserMessage('📸 Foto enviada!');
                    setTimeout(() => {
                        addMessage('helena', 'Ótimo! Sua foto foi recebida. 📸 Agora você pode fazer o quiz para uma análise completa!', '', 'Recepcionista');
                        if (estado.especialista_ativo && estado.especialista_ativo !== 'helena') {
                            setTimeout(() => {
                                addMessage(estado.especialista_ativo, 'Recebi sua foto! Vamos continuar. 🥰', '', 'Análise com foto');
                                mostrarOpcoesAgente(estado.especialista_ativo);
                            }, 500);
                        } else {
                            mostrarOpcoesAgente('helena');
                        }
                    }, 500);
                    break;

                case 'menu_reset':
                    reiniciar();
                    break;

                case 'menu_help':
                    closeMenu();
                    addMessage('helena', `
                        <p>💡 Dicas rápidas:</p>
                        <p>• <strong>Envie uma foto</strong> para análise personalizada</p>
                        <p>• Cada especialista tem um <strong>quiz de 5 perguntas</strong></p>
                        <p>• Cada especialista tem <strong>5 dúvidas frequentes</strong></p>
                        <p>• A <strong>análise completa</strong> combina foto + quiz + imagem de referência</p>
                        <p>• Clique no <strong>logo</strong> ou nos <strong>especialistas</strong> no topo para saber mais</p>
                        <p>• <strong>Arthur</strong>: cortes (Short Bob, Butterfly, Pixie)</p>
                        <p>• <strong>Isabella</strong>: cores (Mel, Cobre, Caramelo)</p>
                        <p>• <strong>Rafael</strong>: visagismo e harmonia facial</p>
                        <p>• Use o menu ☰ para trocar tema ou reiniciar ✨</p>
                    `, '', 'Recepcionista - Ajuda');
                    break;

                default:
                    console.log('Ação não reconhecida:', action);
            }
        }

        // ============================================================
        // 13. TROCAR AGENTE
        // ============================================================
        function trocarAgente(agenteId) {
            if (estado.quiz_ativo) {
                estado.quiz_ativo = null;
                estado.quiz_pergunta_atual = 0;
                estado.quiz_respostas = {};
            }
            if (estado.duvidas_ativo) {
                estado.duvidas_ativo = null;
            }

            if (estado.especialista_ativo === agenteId && estado.contextos[agenteId]?.interacoes > 0) {
                mostrarOpcoesAgente(agenteId);
                return;
            }

            estado.especialista_ativo = agenteId;
            const agente = AGENTES[agenteId];

            updateIndicators(agenteId, false);

            const interacoes = estado.contextos[agenteId]?.interacoes || 0;

            if (interacoes === 0) {
                addDivider(`${agente.emoji} ${agente.nome.toUpperCase()} — ${agente.role.toUpperCase()}`);
                addMessage(agenteId, agente.saudacao, '', `${agente.role} - 1º contato`);
            } else {
                const respostas = {
                    helena: [
                        'Oi! Estou aqui para te ajudar. O que você precisa agora? 🥰',
                        'Que bom te ver de novo! Como posso ajudar você hoje? 💕',
                        'Olá! Pronta para continuar sua jornada de estilo? Me diga o que precisa! ✨',
                    ],
                    arthur: [
                        'Que bom te ver de novo! Vamos continuar falando sobre cortes? ✂️',
                        'Oi! Já pensou em um Short Bob, Butterfly ou Pixie? São tendência! 🦋',
                        'Voltou! Vamos refinar sua escolha. O que você achou das opções? 💇',
                    ],
                    isabella: [
                        'Que bom te ver de novo! Vamos continuar explorando cores? 🎨',
                        'Oi! Já imaginou como ficaria com um tom mais quente? ✨',
                        'Voltou! Vamos refinar a cor perfeita para você. 🌈',
                    ],
                    rafael: [
                        'Que bom te ver de novo! Vamos continuar explorando sua imagem? 👤',
                        'Oi! A harmonia facial é única. Vamos encontrar o estilo que mais valoriza você! ✨',
                        'Voltou! Vamos refinar sua imagem. O que você achou das análises anteriores? 🎯',
                    ]
                };

                const lista = respostas[agenteId] || [`Olá novamente! Como posso te ajudar? 😊`];
                const idx = Math.min(interacoes - 1, lista.length - 1);
                addMessage(agenteId, lista[idx], '', `${agente.role} - ${interacoes+1}º contato`);
            }

            setTimeout(() => {
                mostrarOpcoesAgente(agenteId);
            }, 600);
        }

        // ============================================================
        // 14. MOSTRAR OPÇÕES DO AGENTE
        // ============================================================
        function mostrarOpcoesAgente(agenteId) {
            const botoes = [];

            const temFoto = estado.usuario.foto;
            const temQuiz = estado.usuario.quiz[agenteId] && Object.keys(estado.usuario.quiz[agenteId]).length > 0;

            switch (agenteId) {
                case 'helena':
                    botoes.push(
                        { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                        { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'outline' },
                        { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael (Visagismo)', action: 'ir_para_rafael', class: 'outline' }
                    );
                    break;

                case 'arthur':
                    botoes.push(
                        { label: '🔍 Analisar imagem', action: 'analisar_imagem', class: 'primary', data: { agente: 'arthur' } },
                        { label: '📋 Fazer quiz (5 perguntas)', action: 'iniciar_quiz', class: 'accent', data: { agente: 'arthur' } },
                        { label: '❓ Tirar dúvidas (5 perguntas)', action: 'iniciar_duvidas', class: 'outline', data: { agente: 'arthur' } },
                        { label: '👋 Voltar à Helena', action: 'ir_para_helena', class: 'outline' }
                    );
                    if (temFoto && temQuiz) {
                        botoes.unshift({ label: '✅ Análise completa (foto + quiz + imagem)', action: 'analisar_completo', class: 'success', data: { agente: 'arthur' } });
                    }
                    break;

                case 'isabella':
                    botoes.push(
                        { label: '🔍 Analisar imagem', action: 'analisar_imagem', class: 'primary', data: { agente: 'isabella' } },
                        { label: '📋 Fazer quiz (5 perguntas)', action: 'iniciar_quiz', class: 'accent', data: { agente: 'isabella' } },
                        { label: '❓ Tirar dúvidas (5 perguntas)', action: 'iniciar_duvidas', class: 'outline', data: { agente: 'isabella' } },
                        { label: '👋 Voltar à Helena', action: 'ir_para_helena', class: 'outline' }
                    );
                    if (temFoto && temQuiz) {
                        botoes.unshift({ label: '✅ Análise completa (foto + quiz + imagem)', action: 'analisar_completo', class: 'success', data: { agente: 'isabella' } });
                    }
                    break;

                case 'rafael':
                    botoes.push(
                        { label: '🔍 Analisar imagem', action: 'analisar_imagem', class: 'primary', data: { agente: 'rafael' } },
                        { label: '📋 Fazer quiz (5 perguntas)', action: 'iniciar_quiz', class: 'accent', data: { agente: 'rafael' } },
                        { label: '❓ Tirar dúvidas (5 perguntas)', action: 'iniciar_duvidas', class: 'outline', data: { agente: 'rafael' } },
                        { label: '👋 Voltar à Helena', action: 'ir_para_helena', class: 'outline' }
                    );
                    if (temFoto && temQuiz) {
                        botoes.unshift({ label: '✅ Análise completa (foto + quiz + imagem)', action: 'analisar_completo', class: 'success', data: { agente: 'rafael' } });
                    }
                    break;
            }

            const botoesUnicos = botoes.filter((b, i, arr) =>
                arr.findIndex(a => a.action === b.action && a.label === b.label) === i
            );

            appendButtons(botoesUnicos);
        }

        // ============================================================
        // 15. ANÁLISE COMPLETA (FOTO + QUIZ + IMAGEM)
        // ============================================================
        function analiseCompleta(agenteId) {
            if (!estado.usuario.foto) {
                addMessage('helena', 'Para uma análise completa, preciso que você envie uma foto primeiro. 📸', '', 'Recepcionista');
                appendButtons([
                    { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                    { label: '👋 Voltar', action: `ir_para_${agenteId}`, class: 'outline' }
                ]);
                return;
            }

            const quiz = QUIZ[agenteId];
            if (!quiz) return;

            const respostas = estado.usuario.quiz[agenteId] || {};
            if (Object.keys(respostas).length === 0) {
                addMessage(agenteId, 'Para uma análise completa, você precisa fazer o quiz primeiro! 📋', '', 'Aguardando quiz');
                appendButtons([
                    { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'primary', data: { agente: agenteId } },
                    { label: '👋 Voltar', action: `ir_para_${agenteId}`, class: 'outline' }
                ]);
                return;
            }

            const recomendacoes = quiz.resultado(respostas);
            const recomendacaoFinal = gerarRecomendacaoFinal(agenteId, respostas);
            const imagemRef = quiz.getImagemRecomendacao ? quiz.getImagemRecomendacao(respostas) : null;

            let html = `
                <p>✅ <strong>Análise completa!</strong></p>
                <p>Combinando sua <strong>foto</strong> e as respostas do <strong>quiz</strong>, aqui está o resultado:</p>
                <ul style="margin:8px 0 0 16px; padding-left:4px;">
            `;

            recomendacoes.forEach(r => {
                html += `<li style="margin-bottom:4px;">${r}</li>`;
            });

            html += `</ul>
                <p style="margin-top:10px;padding:10px;background:var(--bg-tag-highlight);border-radius:8px;">
                    📸 <strong>Recomendação final:</strong><br>
                    ${recomendacaoFinal}
                </p>
                <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    ✅ Agora você tem uma visão completa e integrada do seu estilo!
                </p>
            `;

            addMessage(agenteId, html, '', 'Análise completa', imagemRef);

            appendButtons([
                { label: '🔄 Recomeçar', onclick: function() {
                    estado.usuario.quiz[agenteId] = {};
                    estado.quiz_ativo = null;
                    estado.quiz_pergunta_atual = 0;
                    estado.quiz_respostas = {};
                    mostrarOpcoesAgente(agenteId);
                }, class: 'outline' },
                { label: '🔙 Voltar ao menu', onclick: function() {
                    mostrarOpcoesAgente(agenteId);
                }, class: 'outline' }
            ]);
        }

        // ============================================================
        // 16. FUNÇÕES DOS AGENTES
        // ============================================================

                <p>Clique no botão abaixo para enviar sua foto.</p>
                <div class="photo-upload">
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                        📷 Enviar Foto
                    </button>
                </div>
                <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">Após enviar, você poderá fazer o quiz para uma análise completa!</p>
            `, '', 'Recepcionista');
            appendButtons([
                { label: '📸 Enviar foto', action: 'enviar_foto', class: 'primary' },
                { label: '👋 Voltar', action: `ir_para_${agenteId}`, class: 'outline' }
            ]);
        }

        // ---- ARTHUR ----
        function arthurAnalisar() {
            if (!estado.usuario.foto) {
                pedirFotoPrimeiro('arthur');
                return;
            }
            addMessage('arthur', `
                <p>Analisei sua estrutura! 😊</p>
                <p>Tenho 3 sugestões incríveis:</p>
                <p>1. <strong>Short Bob</strong> — moderno, na altura do queixo</p>
                <p>2. <strong>Butterfly</strong> — camadas suaves que criam movimento</p>
                <p>3. <strong>Pixie</strong> — curto, ousado, cheio de personalidade</p>
                <p>Qual desses estilos te agrada mais? 👇</p>
                <p style="font-size:12px;color:var(--text-muted);">Depois faça o quiz para uma análise completa!</p>
            `, '', 'Especialista em cortes - análise');
            appendButtons([
                { label: '✂️ Short Bob', onclick: function() {
                    addUserMessage('✂️ Short Bob');
                    addMessage('arthur', 'Short Bob: moderno, na altura do queixo, super versátil! ✨', '', 'Corte selecionado', HAIR_IMAGES.short_bob);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'arthur' } },
                        { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'arthur' } }
                    ]);
                }, class: 'primary' },
                { label: '🦋 Butterfly', onclick: function() {
                    addUserMessage('🦋 Butterfly');
                    addMessage('arthur', 'Butterfly: camadas suaves que lembram asas, movimento e leveza! 🦋', '', 'Corte selecionado', HAIR_IMAGES.butterfly);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'arthur' } },
                        { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'arthur' } }
                    ]);
                }, class: 'outline' },
                { label: '✂️ Pixie', onclick: function() {
                    addUserMessage('✂️ Pixie');
                    addMessage('arthur', 'Pixie: curto, ousado, cheio de personalidade! ✨', '', 'Corte selecionado', HAIR_IMAGES.pixie);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'arthur' } },
                        { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'arthur' } }
                    ]);
                }, class: 'outline' },
                { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'arthur' } }
            ]);
        }

        // ---- ISABELLA ----
        function isabellaAnalisar() {
            if (!estado.usuario.foto) {
                pedirFotoPrimeiro('isabella');

            addMessage('isabella', `
                <p>Analisei seu tom de pele! 😊</p>
                <p>Minhas sugestões de cor:</p>
                <p>1. <strong>Mel com reflexos</strong> — dourado, ilumina e é natural</p>
                <p>2. <strong>Cobre acobreado</strong> — vibrante, quente, cheio de atitude</p>
                <p>3. <strong>Caramelo</strong> — sofisticado, clássico, aconchegante</p>
                <p>Qual desses tons te agrada mais? 👇</p>
                <p style="font-size:12px;color:var(--text-muted);">Depois faça o quiz para uma análise completa!</p>
            `, '', 'Especialista em cores - análise');
            appendButtons([
                { label: '🍯 Mel', onclick: function() {
                    addUserMessage('🍯 Mel');
                    addMessage('isabella', 'Mel com reflexos: dourado, ilumina e é natural! ✨', '', 'Cor selecionada', HAIR_IMAGES.mel);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'isabella' } },
                        { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'isabella' } }
                    ]);
                }, class: 'primary' },
                { label: '🔥 Cobre', onclick: function() {
                    addUserMessage('🔥 Cobre');
                    addMessage('isabella', 'Cobre acobreado: vibrante, quente, cheio de atitude! 🔥', '', 'Cor selecionada', HAIR_IMAGES.cobre);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'isabella' } },
                        { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'isabella' } }
                    ]);
                }, class: 'outline' },
                { label: '🍫 Caramelo', onclick: function() {
                    addUserMessage('🍫 Caramelo');
                    addMessage('isabella', 'Caramelo: sofisticado, clássico, aconchegante! 🍫', '', 'Cor selecionada', HAIR_IMAGES.caramelo);
                    appendButtons([
                        { label: '📋 Fazer quiz', action: 'iniciar_quiz', class: 'accent', data: { agente: 'isabella' } },

            ]);

        // ---- RAFAEL ----
        function rafaelAnalisar() {
            if (!estado.usuario.foto) {
                pedirFotoPrimeiro('rafael');
                return;
            }
            addMessage('rafael', `
                <p>Pelo que observei, seu rosto tem uma estrutura <strong>versátil</strong>! 😊</p>
                <p>Recomendo:</p>
                <p>✅ Cortes que valorizam a simetria</p>
                <p>✅ Franja lateral para suavizar</p>
                <p>✅ Volume no topo para equilíbrio</p>
                <p style="font-size:12px;color:var(--text-muted);">Depois faça o quiz para uma análise completa!</p>
            `, '', 'Especialista em visagismo - análise');
            appendButtons([
                { label: '✂️ Ver cortes', action: 'ir_para_arthur', class: 'primary' },
                { label: '🎨 Ver cores', action: 'ir_para_isabella', class: 'outline' },
                { label: '🔙 Voltar', action: 'voltar_menu', class: 'outline', data: { agente: 'rafael' } }
            ]);
        }

        // ============================================================
        // 17. INPUT DO USUÁRIO
        // ============================================================
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function handleUserText() {
            const text = userInput.value.trim();
            if (!text) return;

            if (estado.meeting_ativa) {
                addUserMessage(text);
                setTimeout(() => {
                    addMessage('helena', '⏳ Aguarde um momento, nossa equipe está em reunião!', '', 'Recepcionista');
                }, 500);
                userInput.value = '';
                return;
            }

            addUserMessage(text);
            userInput.value = '';

            const lower = text.toLowerCase();

            if (estado.quiz_ativo) {
                const quiz = QUIZ[estado.quiz_ativo];
                const idx = estado.quiz_pergunta_atual;
                if (quiz && idx < quiz.perguntas.length) {
                    const pergunta = quiz.perguntas[idx];
                    const opcaoEncontrada = pergunta.opcoes.find(op =>
                        lower.includes(op.label.toLowerCase()) ||
                        lower.includes(op.valor.toLowerCase())
                    );
                    if (opcaoEncontrada) {
                        responderQuiz(estado.quiz_ativo, idx, opcaoEncontrada.valor);
                        return;
                    }
                }
                if (estado.quiz_pergunta_atual < QUIZ[estado.quiz_ativo].perguntas.length) {
                    estado.quiz_pergunta_atual++;
                    removeLastButtons();
                    setTimeout(() => mostrarPerguntaQuiz(estado.quiz_ativo), 500);
                    return;
                }
            }

            if (lower.includes('quiz') || lower.includes('teste') || lower.includes('pergunta')) {
                if (estado.especialista_ativo && QUIZ[estado.especialista_ativo]) {
                    setTimeout(() => iniciarQuiz(estado.especialista_ativo), 500);
                } else {
                    addMessage('helena', 'Qual especialista você quer consultar? Escolha abaixo:', '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                    ]);
                }
                return;
            }

            if (lower.includes('duvida') || lower.includes('pergunta') || lower.includes('?')) {
                if (estado.especialista_ativo && DUVIDAS[estado.especialista_ativo]) {
                    setTimeout(() => iniciarDuvidas(estado.especialista_ativo), 500);
                } else {
                    addMessage('helena', 'Qual especialista você quer consultar? Escolha abaixo:', '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                        { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' }
                    ]);
                }
                return;
            }

            if (lower.includes('analise completa') || lower.includes('resultado') || lower.includes('completa')) {
                if (estado.especialista_ativo && estado.especialista_ativo !== 'helena') {
                    analiseCompleta(estado.especialista_ativo);
                }
                return;
            }

            if (estado.especialista_ativo && estado.especialista_ativo !== 'helena') {
                const agente = estado.especialista_ativo;
                if (lower.includes('analisar') || lower.includes('imagem') || lower.includes('foto')) {
                    handleAction('analisar_imagem', { agente });
                } else if (lower.includes('voltar') || lower.includes('menu')) {
                    mostrarOpcoesAgente(agente);
                } else {
                    const respostas = {
                        arthur: 'Posso te ajudar com análise de cortes, quiz de 5 perguntas ou dúvidas. O que você prefere? ✂️',
                        isabella: 'Posso te ajudar com análise de cores, quiz de 5 perguntas ou dúvidas. O que você prefere? 🎨',
                        rafael: 'Posso te ajudar com análise de visagismo, quiz de 5 perguntas ou dúvidas. O que você prefere? 👤'
                    };
                    addMessage(agente, respostas[agente] || 'Como posso te ajudar hoje? 😊', '', AGENTES[agente].role);
                    mostrarOpcoesAgente(agente);
                }
                return;
            }

            if (lower.includes('corte') || lower.includes('tesoura')) {
                handleAction('ir_para_arthur');
            } else if (lower.includes('cor') || lower.includes('pintar') || lower.includes('balayage')) {
                handleAction('ir_para_isabella');
            } else if (lower.includes('rosto') || lower.includes('estilo') || lower.includes('imagem') || lower.includes('visag')) {
                handleAction('ir_para_rafael');
            } else {
                addMessage('helena', `
                    <p>Que legal! 🥰</p>
                    <p>Posso te ajudar com:</p>
                    <p>• ✂️ Cortes com o <strong>Arthur</strong></p>
                    <p>• 🎨 Cores com a <strong>Isabella</strong></p>
                    <p>• 👤 Visagismo com o <strong>Rafael</strong></p>
                    <p>• 📋 <strong>Quiz de 5 perguntas</strong> dentro de cada especialista</p>
                    <p>• ❓ <strong>Dúvidas de 5 perguntas</strong> dentro de cada especialista</p>
                    <p style="font-size:12px;color:var(--text-muted);">Escolha uma opção abaixo:</p>
                `, '', 'Recepcionista');
                appendButtons([
                    { label: '✂️ Arthur', action: 'ir_para_arthur', class: 'primary' },
                    { label: '🎨 Isabella', action: 'ir_para_isabella', class: 'outline' },
                    { label: '👤 Rafael', action: 'ir_para_rafael', class: 'outline' },
                    { label: '📸 Enviar foto', action: 'enviar_foto', class: 'outline' }
                ]);
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleUserText();
        });
        sendBtn.addEventListener('click', handleUserText);

        // ============================================================
        // 18. UPLOAD AVATAR
        // ============================================================
        function triggerAvatarUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const url = ev.target.result;
                        estado.usuario.avatarUrl = url;
                        document.documentElement.style.setProperty('--user-avatar', `url('${url}')`);
                        document.querySelectorAll('.avatar.user, .profile-avatar').forEach(el => {
                            el.style.backgroundImage = `url('${url}')`;
                        });
                        document.getElementById('profileAvatar').style.backgroundImage = `url('${url}')`;
                        addUserMessage('🖼️ Meu novo avatar!');
                        setTimeout(() => {
                            addMessage('helena', 'Que legal! Agora seu perfil está ainda mais personalizado. 🥰', '', 'Recepcionista');
                        }, 400);
                        closeMenu();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        document.getElementById('profileUploadBtn').addEventListener('click', triggerAvatarUpload);

        // ============================================================
        // 19. MENU - AÇÕES
        // ============================================================
        document.getElementById('menuReset').addEventListener('click', () => {
            reiniciar();
        });

        document.getElementById('menuHelp').addEventListener('click', () => {
            closeMenu();
            addMessage('helena', `
                <p>💡 Dicas rápidas:</p>
                <p>• <strong>Envie uma foto</strong> para análise personalizada</p>
                <p>• Cada especialista tem um <strong>quiz de 5 perguntas</strong></p>
                <p>• Cada especialista tem <strong>5 dúvidas frequentes</strong></p>
                <p>• A <strong>análise completa</strong> combina foto + quiz + imagem de referência</p>
                <p>• Clique no <strong>logo</strong> ou nos <strong>especialistas</strong> no topo para saber mais</p>
                <p>• <strong>Arthur</strong>: cortes (Short Bob, Butterfly, Pixie)</p>
                <p>• <strong>Isabella</strong>: cores (Mel, Cobre, Caramelo)</p>
                <p>• <strong>Rafael</strong>: visagismo e harmonia facial</p>
                <p>• Use o menu ☰ para trocar tema ou reiniciar ✨</p>
            `, '', 'Recepcionista - Ajuda');
        });

        // ============================================================
        // 20. REINICIAR
        // ============================================================
        function reiniciar() {
            estado = {
                passo: 'boas_vindas',
                especialista_ativo: null,
                usuario: {
                    foto: false,
                    corte: null,
                    cor: null,
                    avatarUrl: estado.usuario.avatarUrl,
                    quiz: { arthur: {}, isabella: {}, rafael: {} }
                },
                meeting_ativa: false,
                contextos: {
                    helena: { interacoes: 0 },
                    arthur: { interacoes: 0 },
                    isabella: { interacoes: 0 },
                    rafael: { interacoes: 0 },
                },
                ultima_pergunta: null,
                historico: [],
                quiz_ativo: null,
                quiz_pergunta_atual: 0,
                quiz_respostas: {},
                duvidas_ativo: null,
                duvidas_pergunta_atual: 0,
            };
            const msgs = messagesEl.querySelectorAll('.message, .divider, .meeting-badge');
            msgs.forEach(el => el.remove());
            setTimeout(() => boasVindas(), 300);
            closeMenu();
        }

        // ============================================================
        // 21. BOAS-VINDAS
        // ============================================================
        function boasVindas() {
            addMeetingBadge('👋 HAIROS — CONSULTORIA DE IMAGEM');
            addMessage('helena', `
                <p>Oi! Tudo bem? Sou a <strong>Helena</strong>, sua recepcionista. 🥰</p>
                <p>Para começar, <strong>me envie uma foto do seu cabelo</strong> para que nossa equipe possa analisar.</p>
                <div class="photo-upload">
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                        📷 Enviar Foto
                    </button>
                </div>
                <p style="margin-top:8px;font-size:12px;color:var(--text-muted);">Ou escolha um especialista para começar:</p>
            `, '', 'Recepcionista - Boas-vindas');
            appendButtons([
                { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'primary' },
                { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'outline' },
                { label: '👤 Rafael (Visagismo)', action: 'ir_para_rafael', class: 'outline' }
            ]);
            estado.passo = 'boas_vindas';

            const existingInput = document.getElementById('fileInput');
            if (!existingInput) {
                const input = document.createElement('input');
                input.type = 'file';
                input.id = 'fileInput';
                input.accept = 'image/*';
                input.style.display = 'none';
                input.addEventListener('change', function(e) {
                    if (this.files && this.files[0]) handleAction('foto_enviada');
                });
                document.body.appendChild(input);
            }
        }

        // ============================================================
        // 22. INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(boasVindas, 400);
            setTimeout(() => {
                const allAgents = ['helena', 'arthur', 'isabella', 'rafael'];
                animateAgentConversation(allAgents, 2000);
            }, 600);

            window.analisar_completo = function(data) {
                const agente = data?.agente || estado.especialista_ativo;
                if (agente) analiseCompleta(agente);
            };
        });
    </script>
