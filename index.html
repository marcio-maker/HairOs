<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HairOS — Salão Inteligente</title>

    <style>
        /* ============================================================
           VARIÁVEIS E TEMA
           ============================================================ */
        :root {
            --bg-body: #f5f0eb;
            --bg-chat: #ffffff;
            --bg-header: #1a1a1a;
            --bg-messages: #faf8f6;
            --bg-bubble-user: #1a1a1a;
            --bg-bubble-bot: #ffffff;
            --bg-input: #faf8f6;
            --bg-btn-primary: #1a1a1a;
            --bg-btn-primary-hover: #333;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #f5f0eb;
            --bg-tag: #f0ebe6;
            --bg-tag-highlight: #d4a57422;
            --bg-divider: transparent;
            --bg-meeting: #d4a57422;
            --bg-menu: #1a1a1a;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --text-white: #fff;
            --text-bubble-user: #fff;
            --text-bubble-bot: #1a1a1a;
            --text-header: #fff;
            --text-header-muted: #888;
            --text-accent: #b8834a;
            --text-menu: #fff;
            --border-input: #e8e0da;
            --border-input-focus: #d4a574;
            --border-bubble: transparent;
            --border-btn-outline: #ddd;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0, 0, 0, 0.06);
            --shadow-chat: 0 20px 60px rgba(0, 0, 0, 0.12);
            --shadow-menu: 0 8px 30px rgba(0, 0, 0, 0.4);
            --avatar-helena: linear-gradient(135deg, #e8b4a0, #d49a82);
            --avatar-arthur: linear-gradient(135deg, #7ec8d4, #4a9aa8);
            --avatar-isabella: linear-gradient(135deg, #f0a8c4, #d4789a);
            --avatar-rafael: linear-gradient(135deg, #b8a0c8, #8e76a8);
            --avatar-user: linear-gradient(135deg, #ccc, #999);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #d4a574;
        }

        [data-theme="dark"] {
            --bg-body: #0d0d0d;
            --bg-chat: #1a1a1a;
            --bg-header: #0d0d0d;
            --bg-messages: #141414;
            --bg-bubble-user: #2a2a2a;
            --bg-bubble-bot: #1e1e1e;
            --bg-input: #1a1a1a;
            --bg-btn-primary: #d4a574;
            --bg-btn-primary-hover: #c49464;
            --bg-btn-accent: #d4a574;
            --bg-btn-accent-hover: #c49464;
            --bg-btn-outline: transparent;
            --bg-btn-outline-hover: #2a2a2a;
            --bg-tag: #2a2a2a;
            --bg-tag-highlight: #d4a57433;
            --bg-divider: transparent;
            --bg-meeting: #d4a57433;
            --bg-menu: #0d0d0d;
            --bg-menu-item-hover: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --text-muted: #666;
            --text-white: #fff;
            --text-bubble-user: #f0f0f0;
            --text-bubble-bot: #f0f0f0;
            --text-header: #fff;
            --text-header-muted: #666;
            --text-accent: #d4a574;
            --text-menu: #f0f0f0;
            --border-input: #333;
            --border-input-focus: #d4a574;
            --border-bubble: #2a2a2a;
            --border-btn-outline: #444;
            --border-menu: #333;
            --shadow-bubble: 0 1px 4px rgba(0, 0, 0, 0.3);
            --shadow-chat: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-menu: 0 8px 30px rgba(0, 0, 0, 0.7);
            --avatar-helena: linear-gradient(135deg, #c4947a, #b8834a);
            --avatar-arthur: linear-gradient(135deg, #5a9aa8, #3a7a88);
            --avatar-isabella: linear-gradient(135deg, #d4789a, #b85a7a);
            --avatar-rafael: linear-gradient(135deg, #8e76a8, #6a5a88);
            --avatar-user: linear-gradient(135deg, #555, #333);
            --avatar-system: #1a1a1a;
            --scrollbar-thumb: #555;
        }

        /* ============================================================
           RESET E BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 780px;
            background: var(--bg-chat);
            border-radius: 32px;
            box-shadow: var(--shadow-chat);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .chat-header {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            transition: background 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .chat-header .logo {
            font-size: 18px;
            font-weight: 700;
        }
        .chat-header .logo span {
            color: #d4a574;
        }
        .chat-header .status {
            font-size: 11px;
            color: var(--text-header-muted);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
        }
        .chat-header .status .dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-header-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            line-height: 1;
        }
        .menu-btn:hover {
            color: var(--text-header);
        }

        /* ============================================================
           INDICADORES DOS AGENTES
           ============================================================ */
        .agent-indicators {
            display: flex;
            gap: 6px;
            margin-left: 6px;
            align-items: center;
        }
        .agent-indicators .indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            cursor: default;
        }
        .agent-indicators .indicator.active {
            border-color: #d4a574;
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(212, 165, 116, 0.5);
        }
        .agent-indicators .indicator.speaking {
            animation: speak-pulse 0.8s ease-in-out infinite alternate;
            border-color: #4ade80;
            box-shadow: 0 0 16px rgba(74, 222, 128, 0.6);
        }
        @keyframes speak-pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
            }
            100% {
                transform: scale(1.15);
                box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            }
        }
        .agent-indicators .indicator .wave-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: ring-wave 1.2s ease-out infinite;
            pointer-events: none;
        }
        .agent-indicators .indicator.speaking .wave-ring {
            border-color: rgba(74, 222, 128, 0.4);
        }
        @keyframes ring-wave {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
        .agent-indicators .indicator .agent-label {
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .agent-indicators .indicator:hover .agent-label {
            opacity: 1;
        }

        /* ============================================================
           MENU LATERAL
           ============================================================ */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .menu-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: var(--bg-menu);
            box-shadow: var(--shadow-menu);
            z-index: 100;
            transform: translateX(-110%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 0 20px 20px 0;
            overflow-y: auto;
        }
        .menu-panel.open {
            transform: translateX(0);
        }
        .menu-panel .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-menu);
        }
        .menu-panel .menu-header span {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-menu);
        }
        .menu-panel .menu-close {
            background: none;
            border: none;
            color: var(--text-header-muted);
            font-size: 20px;
            cursor: pointer;
        }
        .menu-panel .menu-close:hover {
            color: var(--text-header);
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-menu);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            text-align: left;
        }
        .menu-item:hover {
            background: var(--bg-menu-item-hover);
        }
        .menu-item .icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }
        .menu-item .label {
            flex: 1;
        }
        .menu-item .badge {
            font-size: 11px;
            background: rgba(212, 165, 116, 0.25);
            color: var(--text-accent);
            padding: 2px 10px;
            border-radius: 12px;
        }
        .menu-divider {
            height: 1px;
            background: var(--border-menu);
            margin: 4px 0;
        }
        .menu-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            margin-bottom: 4px;
        }
        .menu-profile .profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--avatar-user);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 2px solid var(--border-menu);
        }
        .menu-profile .profile-name {
            color: var(--text-menu);
            font-weight: 600;
            font-size: 14px;
        }
        .menu-profile .profile-sub {
            color: var(--text-header-muted);
            font-size: 11px;
        }
        .menu-profile .profile-upload {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border-menu);
            color: var(--text-header-muted);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .menu-profile .profile-upload:hover {
            background: var(--bg-menu-item-hover);
            color: var(--text-menu);
        }

        /* ============================================================
           MENSAGENS
           ============================================================ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-messages);
            transition: background 0.3s ease;
        }
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 92%;
            animation: fade-in 0.3s ease;
        }
        .message.bot {
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-indent: -9999px;
        }
        .avatar.helena {
            background-image: url('https://images.unsplash.com/photo-1580618672591-eb180b1a973f?w=80&h=80&fit=crop&crop=face');
        }
        .avatar.arthur {
            background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face');
        }
        .avatar.isabella {
            background-image: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?w=80&h=80&fit=crop&crop=face');
        }
        .avatar.rafael {
            background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=80&h=80&fit=crop&crop=face');
        }
        .avatar.user {
            background-image: var(--user-avatar, url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&h=80&fit=crop&crop=face'));
            background-size: cover;
            font-size: 14px;
            text-indent: -9999px;
        }
        .avatar.system {
            background: var(--avatar-system);
            font-size: 12px;
            text-indent: 0;
        }

        .bubble {
            background: var(--bg-bubble-bot);
            padding: 10px 14px;
            border-radius: 14px;
            border-top-left-radius: 4px;
            box-shadow: var(--shadow-bubble);
            line-height: 1.5;
            font-size: 13.5px;
            color: var(--text-bubble-bot);
            flex: 1;
            border: 1px solid var(--border-bubble);
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .message.user .bubble {
            background: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-top-left-radius: 14px;
            border-top-right-radius: 4px;
            border-color: transparent;
        }
        .bubble .agent-name {
            font-weight: 700;
            font-size: 12px;
            display: block;
            margin-bottom: 1px;
            color: var(--text-primary);
        }
        .bubble .agent-role {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            margin-bottom: 3px;
        }
        .bubble .agent-desc {
            font-size: 11px;
            color: var(--text-accent);
            font-weight: 500;
            display: inline-block;
            margin-bottom: 4px;
            padding: 3px 10px;
            background: var(--bg-tag-highlight);
            border-radius: 8px;
        }
        .bubble .text {
            margin-top: 2px;
            color: var(--text-primary);
        }
        .bubble .text p {
            margin-bottom: 5px;
        }
        .bubble .text p:last-child {
            margin-bottom: 0;
        }
        .bubble .agent-context {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid var(--border-input);
        }

        .hair-image {
            width: 100%;
            border-radius: 12px;
            margin: 6px 0 8px 0;
            display: block;
            border: 1px solid var(--border-input);
            max-height: 200px;
            object-fit: cover;
        }
        .hair-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 6px 0 8px 0;
        }
        .hair-grid .hair-image {
            margin: 0;
            max-height: 120px;
        }

        .tag {
            display: inline-block;
            background: var(--bg-tag);
            padding: 0 10px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            margin: 2px 2px 0 0;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .tag.highlight {
            background: var(--bg-tag-highlight);
            color: var(--text-accent);
            font-weight: 600;
        }

        .typing-dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 4px;
        }
        .typing-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing-bounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing-bounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .quick-buttons .btn {
            background: var(--bg-btn-outline);
            border: 1.5px solid var(--border-btn-outline);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
        }
        .quick-buttons .btn:hover {
            background: var(--bg-btn-outline-hover);
            transform: translateY(-1px);
        }
        .quick-buttons .btn.primary {
            background: var(--bg-btn-primary);
            color: #fff;
            border-color: var(--bg-btn-primary);
        }
        .quick-buttons .btn.primary:hover {
            background: var(--bg-btn-primary-hover);
            border-color: var(--bg-btn-primary-hover);
        }
        .quick-buttons .btn.accent {
            background: var(--bg-btn-accent);
            color: #fff;
            border-color: var(--bg-btn-accent);
        }
        .quick-buttons .btn.accent:hover {
            background: var(--bg-btn-accent-hover);
            border-color: var(--bg-btn-accent-hover);
        }
        .quick-buttons .btn.outline {
            background: var(--bg-btn-outline);
            border-color: var(--border-btn-outline);
            color: var(--text-secondary);
        }
        .quick-buttons .btn.outline:hover {
            border-color: var(--text-accent);
            background: var(--bg-btn-outline-hover);
        }
        .quick-buttons .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 3px 0;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--bg-divider);
            transition: color 0.3s ease;
        }
        .meeting-badge {
            display: block;
            text-align: center;
            background: var(--bg-meeting);
            color: var(--text-accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin: 4px 0;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .meeting-badge .pulse-text {
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .photo-upload {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .photo-upload .btn {
            flex: 1;
            justify-content: center;
        }

        .chat-input {
            padding: 10px 14px 14px 14px;
            background: var(--bg-chat);
            border-top: 1px solid var(--border-input);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .chat-input input {
            flex: 1;
            padding: 9px 14px;
            border: 1.5px solid var(--border-input);
            border-radius: 24px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .chat-input input:focus {
            border-color: var(--border-input-focus);
            background: var(--bg-chat);
        }
        .chat-input input::placeholder {
            color: var(--text-muted);
            font-size: 12px;
        }
        .chat-input .send-btn {
            background: var(--bg-btn-primary);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input .send-btn:hover {
            background: var(--bg-btn-primary-hover);
        }

        @media (max-width: 520px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;

        (function initTheme() {
            const themeToggle = document.getElementById('menuThemeToggle');

            const themeLabel = document.getElementById('menuThemeLabel');
            const themeBadge = document.getElementById('menuThemeBadge');
            let currentTheme = localStorage.getItem('hairos-theme') || 'light';

            function setTheme(theme) {
                currentTheme = theme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('hairos-theme', theme);
                const isDark = theme === 'dark';
                themeIcon.textContent = isDark ? '☀️' : '🌙';
                themeLabel.textContent = isDark ? 'Modo claro' : 'Modo escuro';
                themeBadge.textContent = isDark ? 'Claro' : 'Escuro';
            }
            setTheme(currentTheme);
            themeToggle.addEventListener('click', () => {
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
                closeMenu();
            });
        })();

            cabelo_cacheado: 'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=400&h=300&fit=crop',
            cabelo_liso: 'https://images.unsplash.com/photo-1562322140-8baeececf3df?w=400&h=300&fit=crop',
        };

        const CORTES = {
            short_bob: { nome: 'Short Bob', imagem: HAIR_IMAGES.short_bob,
            descricao: 'Moderno, na altura do queixo, versátil' },
            butterfly: { nome: 'Butterfly', imagem: HAIR_IMAGES.butterfly,
            descricao: 'Camadas suaves que lembram asas, movimento e leveza' },
            pixie: { nome: 'Pixie', imagem: HAIR_IMAGES.pixie, descricao: 'Curto, ousado, cheio de personalidade' },
        };

        const CORES = {
            mel: { nome: 'Mel com reflexos', imagem: HAIR_IMAGES.mel, descricao: 'Dourado, ilumina e é natural' },
            cobre: { nome: 'Cobre acobreado', imagem: HAIR_IMAGES.cobre, descricao: 'Vibrante, quente, cheio de atitude' },
            caramelo: { nome: 'Caramelo', imagem: HAIR_IMAGES.caramelo,
            descricao: 'Sofisticado, clássico, aconchegante' },
        };

        // ============================================================
        // 5. ESTADO
        // ============================================================
        let estado = {
            passo: 'boas_vindas',
            especialista_ativo: null,
            usuario: {
                foto: false,
                corte: null,
                cor: null,
                avatarUrl: null,
            },
            meeting_ativa: false,
            contextos: {
                helena: { ultimo_tema: null, interacoes: 0 },
                arthur: { ultimo_tema: null, interacoes: 0, ultima_sugestao: null },
                isabella: { ultimo_tema: null, interacoes: 0, ultima_sugestao: null },
                rafael: { ultimo_tema: null, interacoes: 0 },
            },
            ultima_pergunta: null,
            historico: [],
        };

        // ============================================================
        // 6. RENDERIZAÇÃO
        // ============================================================
        const messagesEl = document.getElementById('messages');
        const indicators = document.querySelectorAll('.indicator');

        function scrollToBottom() {
            setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
        }

        function updateIndicators(agenteId, speaking = false) {
            indicators.forEach(el => {
                const isTarget = el.dataset.agent === agenteId;
                el.classList.toggle('active', isTarget);
                el.classList.toggle('speaking', speaking && isTarget);
            });
        }

        function animateAgentConversation(agentes, duration = 2000) {
            let index = 0;
            const interval = setInterval(() => {
                indicators.forEach(el => el.classList.remove('speaking', 'active'));
                const current = agentes[index % agentes.length];
                const el = document.querySelector(`.indicator[data-agent="${current}"]`);
                if (el) {
                    el.classList.add('speaking', 'active');
                }
                index++;
                if (index >= agentes.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        indicators.forEach(el => {
                            el.classList.remove('speaking', 'active');
                            if (el.dataset.agent === 'helena') el.classList.add('active');
                        });
                    }, 400);
                }
            }, duration / agentes.length);
        }

        function addMessage(agenteId, html, extraClass = '', contexto = null, imagens = null) {
            const agente = AGENTES[agenteId];
            if (!agente) return;
            const div = document.createElement('div');
            div.className = `message bot ${extraClass}`;
            let contextHtml = '';
            if (contexto) {
                contextHtml = `<div class="agent-context">💭 ${contexto}</div>`;
            }
            let imagesHtml = '';
            if (imagens) {
                if (Array.isArray(imagens)) {
                    imagesHtml =
                        `<div class="hair-grid">${imagens.map(img => `<img src="${img}" class="hair-image" alt="Cabelo" loading="lazy" />`).join('')}</div>`;
                } else {
                    imagesHtml = `<img src="${imagens}" class="hair-image" alt="Cabelo" loading="lazy" />`;
                }
            }
            const descHtml = agente.descricao ? `<span class="agent-desc">${agente.descricao}</span>` : '';

            div.innerHTML = `
                <div class="avatar ${agente.avatar}"></div>
                <div class="bubble ${extraClass}">
                    <span class="agent-name">${agente.emoji} ${agente.nome}</span>
                    <span class="agent-role">${agente.role}</span>
                    ${descHtml}
                    <div class="text">
                        ${html}
                        ${imagesHtml}
                    </div>
                    ${contextHtml}
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            updateIndicators(agenteId);
            const allAgents = ['helena', 'arthur', 'isabella', 'rafael'];
            animateAgentConversation(allAgents, 1800);
            if (estado.contextos[agenteId]) {
                estado.contextos[agenteId].interacoes += 1;
            }
            estado.historico.push({ agente: agenteId, texto: html });
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            const avatarStyle = estado.usuario.avatarUrl ? `background-image: url('${estado.usuario.avatarUrl}');` : '';
            div.innerHTML = `
                <div class="avatar user" style="${avatarStyle}"></div>
                <div class="bubble">${text}</div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            estado.ultima_pergunta = text;
            estado.historico.push({ agente: 'usuario', texto: text });
        }

        function addDivider(texto) {
            const div = document.createElement('div');
            div.className = 'divider';
            div.textContent = texto;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addMeetingBadge(texto, pulsante = false) {
            const div = document.createElement('div');
            div.className = 'meeting-badge';
            div.innerHTML = `🎙️ ${pulsante ? '<span class="pulse-text">' + texto + '</span>' : texto}`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function createButtons(buttons) {
            const container = document.createElement('div');
            container.className = 'quick-buttons';
            buttons.forEach(btn => {
                const el = document.createElement('button');
                el.className = `btn ${btn.class || ''}`;
                el.textContent = btn.label;
                el.dataset.action = btn.action;
                if (btn.disabled) el.disabled = true;
                el.addEventListener('click', () => {
                    if (btn.action) handleAction(btn.action, btn.data);
                });
                container.appendChild(el);
            });
            return container;
        }

        function appendButtons(buttons) {
            const msgs = messagesEl.querySelectorAll('.message.bot');
            if (msgs.length === 0) return;
            const last = msgs[msgs.length - 1];
            const bubble = last.querySelector('.bubble');
            if (bubble) {
                const existing = bubble.querySelector('.quick-buttons');
                if (existing) existing.remove();
                bubble.appendChild(createButtons(buttons));
            }
        }

        function removeLastButtons() {
            const msgs = messagesEl.querySelectorAll('.message.bot');
            if (msgs.length === 0) return;
            const last = msgs[msgs.length - 1];
            const bubble = last.querySelector('.bubble');
            if (bubble) {
                const existing = bubble.querySelector('.quick-buttons');
                if (existing) existing.remove();
            }
        }

        // ============================================================
        // 7. REUNIÃO DOS ESPECIALISTAS
        // ============================================================
        function executarReuniao(agentes, callback) {
            estado.meeting_ativa = true;
            let delay = 1000;
            addMeetingBadge('REUNIÃO DOS ESPECIALISTAS', true);
            removeLastButtons();

            agentes.forEach((agente, index) => {
                setTimeout(() => {
                    updateIndicators(agente.id, true);
                    const agenteInfo = AGENTES[agente.id];
                    const div = document.createElement('div');
                    div.className = `message bot`;
                    const descHtml = agenteInfo.descricao ? `<span class="agent-desc">${agenteInfo.descricao}</span>` :
                        '';
                    div.innerHTML = `
                        <div class="avatar ${agenteInfo.avatar}"></div>
                        <div class="bubble">
                            <span class="agent-name">${agenteInfo.emoji} ${agenteInfo.nome}</span>
                            <span class="agent-role">${agenteInfo.role}</span>
                            ${descHtml}
                            <div class="text">
                                ${agente.texto}
                                <div class="typing-dots" style="display:${index === agentes.length - 1 ? 'none' : 'inline-flex'}">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                    `;
                    messagesEl.appendChild(div);
                    scrollToBottom();

                    if (index < agentes.length - 1) {
                        setTimeout(() => {
                            const dots = div.querySelector('.typing-dots');
                            if (dots) dots.style.display = 'none';
                        }, 1000);
                    }

                    setTimeout(() => {
                        updateIndicators(agente.id, false);
                    }, 800);

                }, delay);
                delay += 1200 + Math.random() * 400;
            });

            setTimeout(() => {
                addMeetingBadge('✅ REUNIÃO FINALIZADA');
                estado.meeting_ativa = false;
                if (callback) callback();
                setTimeout(() => {
                    indicators.forEach(el => {
                        el.classList.remove('speaking', 'active');
                        if (el.dataset.agent === 'helena') el.classList.add('active');
                    });
                }, 300);
            }, delay + 500);
        }

        // ============================================================
        // 8. PERGUNTAS PRONTAS DOS ESPECIALISTAS (6 CADA)
        // ============================================================

        // ---- HELENA - 6 PERGUNTAS ----

        // ============================================================

                        `, '', 'Recepcionista - diagnóstico');
                        appendButtons([
                            { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'primary' },
                            { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'primary' },

                    }, 500);
                    break;

                    // ---- ARTHUR - ANÁLISE (COM FOTO) ----
                case 'arthur_analisar':
                    if (!estado.usuario.foto) {
                        addUserMessage('🔍 Analisar meu cabelo');

                    addMessage('helena', `
                        <p>Que legal sua curiosidade! 🥰</p>
                        <p>Posso te ajudar com isso. Qual especialista você gostaria de consultar?</p>
                    `, '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'primary' },
                        { label: '👤 Rafael (Imagem)', action: 'ir_para_rafael', class: 'primary' },
                        { label: '👋 Helena (Atendimento)', action: 'ir_para_helena', class: 'outline' },
                    ]);
                }, 600);
            } else {
                setTimeout(() => {
                    const respostas = [
                        'Obrigada! 🥰 Escolha um especialista para iniciar uma conversa personalizada.',
                        'Que legal sua curiosidade! Quer falar com Arthur (cortes), Isabella (cores) ou Rafael (imagem)? 💇',
                        'Estou aqui para te guiar! Temos especialistas incríveis para cada área. Qual você quer conhecer? ✨'
                    ];
                    const idx = Math.floor(Math.random() * respostas.length);
                    addMessage('helena', respostas[idx], '', 'Recepcionista');
                    appendButtons([
                        { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'primary' },
                        { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'primary' },
                        { label: '👤 Rafael (Imagem)', action: 'ir_para_rafael', class: 'primary' },
                        { label: '👋 Helena (Atendimento)', action: 'ir_para_helena', class: 'outline' },
                    ]);
                }, 600);
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleUserText();
        });
        sendBtn.addEventListener('click', handleUserText);

        // ============================================================
        // 14. UPLOAD AVATAR
        // ============================================================
        function triggerAvatarUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const url = ev.target.result;
                        estado.usuario.avatarUrl = url;
                        document.documentElement.style.setProperty('--user-avatar', `url('${url}')`);
                        document.querySelectorAll('.avatar.user, .profile-avatar').forEach(el => {
                            el.style.backgroundImage = `url('${url}')`;
                        });
                        document.getElementById('profileAvatar').style.backgroundImage = `url('${url}')`;
                        addUserMessage('🖼️ Meu novo avatar!');
                        setTimeout(() => {
                            addMessage('helena', 'Que legal! Agora seu perfil está ainda mais personalizado. 🥰',
                                '', 'Recepcionista');
                        }, 400);
                        closeMenu();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        document.getElementById('profileUploadBtn').addEventListener('click', triggerAvatarUpload);

        // ============================================================
        // 15. MENU - AÇÕES
        // ============================================================
        document.getElementById('menuReset').addEventListener('click', () => {
            reiniciar();
        });

        document.getElementById('menuHelp').addEventListener('click', () => {
            closeMenu();
            addMessage('helena', `
                <p>💡 Dicas rápidas:</p>
                <p>• Envie uma foto para análise personalizada</p>
                <p>• <strong>Arthur</strong>: cortes (Short Bob, Butterfly, Pixie)</p>
                <p>• <strong>Isabella</strong>: cores (Mel, Cobre, Caramelo)</p>
                <p>• <strong>Rafael</strong>: visagismo e harmonia facial</p>
                <p>• <strong>Tire dúvidas</strong> com qualquer especialista!</p>
                <p>• Faça o <strong>teste de diagnóstico</strong> para descobrir o que seu cabelo precisa!</p>
                <p>• Use o menu ☰ para trocar tema, avatar ou reiniciar ✨</p>
            `, '', 'Recepcionista - Ajuda');
        });

        // ============================================================
        // 16. REINICIAR
        // ============================================================
        function reiniciar() {
            estado = {
                passo: 'boas_vindas',
                especialista_ativo: null,
                usuario: { foto: false, corte: null, cor: null, avatarUrl: estado.usuario.avatarUrl },
                meeting_ativa: false,
                contextos: {
                    helena: { ultimo_tema: null, interacoes: 0 },
                    arthur: { ultimo_tema: null, interacoes: 0, ultima_sugestao: null },
                    isabella: { ultimo_tema: null, interacoes: 0, ultima_sugestao: null },
                    rafael: { ultimo_tema: null, interacoes: 0 },
                },
                ultima_pergunta: null,
                historico: [],
            };
            const msgs = messagesEl.querySelectorAll('.message, .divider, .meeting-badge');
            msgs.forEach(el => el.remove());
            setTimeout(() => boasVindas(), 300);
            closeMenu();
        }

        // ============================================================
        // 17. BOAS-VINDAS
        // ============================================================
        function boasVindas() {
            addMeetingBadge('👋 HAIROS — CONSULTORIA DE IMAGEM');
            addMessage('helena', `
                <p>Oi! Tudo bem? Sou a <strong>Helena</strong>, sua recepcionista. 🥰</p>
                <p>Para começar, <strong>me envie uma foto do seu cabelo</strong> para que nossa equipe de especialistas possa analisar.</p>
                <div class="photo-upload">
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()" style="flex:1;border:none;padding:8px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:inherit;">
                        📷 Enviar Foto
                    </button>
                </div>
                <p style="margin-top:8px;font-size:12px;color:var(--text-muted);">Ou tire dúvidas com os especialistas:</p>
            `, '', 'Recepcionista - Boas-vindas');
            appendButtons([
                { label: '✂️ Arthur (Cortes)', action: 'ir_para_arthur', class: 'primary' },
                { label: '🎨 Isabella (Cores)', action: 'ir_para_isabella', class: 'primary' },
                { label: '👤 Rafael (Imagem)', action: 'ir_para_rafael', class: 'primary' },
                { label: '👋 Helena (Atendimento)', action: 'ir_para_helena', class: 'outline' },
            ]);
            estado.passo = 'boas_vindas';

            const existingInput = document.getElementById('fileInput');
            if (!existingInput) {
                const input = document.createElement('input');
                input.type = 'file';
                input.id = 'fileInput';
                input.accept = 'image/*';
                input.style.display = 'none';
                input.addEventListener('change', function(e) {
                    if (this.files && this.files[0]) handleAction('foto_enviada');
                });
                document.body.appendChild(input);
            }
        }

        // ============================================================
        // 18. INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(boasVindas, 400);
            setTimeout(() => {
                const allAgents = ['helena', 'arthur', 'isabella', 'rafael'];
                animateAgentConversation(allAgents, 2000);
            }, 600);
        });
    </script>

</body>
</html>
